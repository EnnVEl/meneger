            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <h2>🐷 Положить в копилку</h2>
                <label>Сколько баллов хотите сберечь?</label>
                <input type="number" id="piggyAmount" value="${Math.min(10, data.balance)}" min="1" max="${data.balance}" onkeydown="if(event.key==='Enter') saveToPiggy()" onfocus="this.select()">
                <div style="font-size:12px; opacity:0.7; margin-top:5px;">Доступно: ${data.balance} баллов</div>
                <div class="buttons">
                    <button class="btn-primary" onclick="saveToPiggy()">💾 Сохранить</button>
                    <button onclick="closeModal()">❌ Отмена</button>
                </div>
            `;
            
            modal.classList.add('active');
            setTimeout(() => {
                const input = document.getElementById('piggyAmount');
                if (input) {
                    input.focus();
                    input.select();
                }
            }, 100);
        }

        function saveToPiggy() {
            const amount = parseInt(document.getElementById('piggyAmount').value) || 0;
            if (amount <= 0) {
                showNotification('❌ Введите корректную сумму!');
                return;
            }
            if (amount > data.balance) {
                showNotification('❌ Недостаточно баллов!');
                return;
            }
            
            data.balance -= amount;
            data.piggyBalance += amount;
            saveData();
            updateBalance();
            updatePiggyBalance();
            closeModal();
            showNotification(`✅ ${amount} баллов сохранено в копилке!`);
            playClickSound();
        }

        function openPiggyWithdraw() {
            if (data.piggyBalance <= 0) {
                showNotification('❌ В копилке нет баллов!');
                return;
            }
            
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <h2>✏️ Забрать из копилки</h2>
                <label>Сколько баллов хотите забрать?</label>
                <input type="number" id="piggyWithdrawAmount" value="${Math.min(10, data.piggyBalance)}" min="1" max="${data.piggyBalance}" onkeydown="if(event.key==='Enter') withdrawFromPiggy()" onfocus="this.select()">
                <div style="font-size:12px; opacity:0.7; margin-top:5px;">В копилке: ${data.piggyBalance} баллов</div>
                <div class="buttons">
                    <button class="btn-primary" onclick="withdrawFromPiggy()">💾 Забрать</button>
                    <button onclick="closeModal()">❌ Отмена</button>
                </div>
            `;
            
            modal.classList.add('active');
            setTimeout(() => {
                const input = document.getElementById('piggyWithdrawAmount');
                if (input) {
                    input.focus();
                    input.select();
                }
            }, 100);
        }

        function withdrawFromPiggy() {
            const amount = parseInt(document.getElementById('piggyWithdrawAmount').value) || 0;
            if (amount <= 0) {
                showNotification('❌ Введите корректную сумму!');
                return;
            }
            if (amount > data.piggyBalance) {
                showNotification('❌ В копилке недостаточно баллов!');
                return;
            }
            
            data.piggyBalance -= amount;
            data.balance += amount;
            saveData();
            updateBalance();
            updatePiggyBalance();
            closeModal();
            showNotification(`✅ ${amount} баллов забрано из копилки!`);
            playClickSound();
        }

        function openPiggyBreak() {
            if (data.piggyBalance <= 0) {
                showNotification('❌ В копилке нет баллов!');
                return;
            }
            
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <h2>🔨 Разбить копилку</h2>
                <p style="text-align:center; font-size:16px; margin:15px 0;">В копилке: ${data.piggyBalance} баллов</p>
                <p style="text-align:center; opacity:0.7;">Вы хотите разбить копилку или забрать часть?</p>
                <div class="buttons" style="justify-content:center;">
                    <button class="btn-danger" onclick="breakPiggy()">🔨 Разбить всё</button>
                    <button class="btn-primary" onclick="closeModal(); setTimeout(openPiggyWithdraw, 300);">✏️ Забрать часть</button>
                    <button onclick="closeModal()">❌ Отмена</button>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function breakPiggy() {
            const amount = data.piggyBalance;
            data.balance += amount;
            data.piggyBalance = 0;
            saveData();
            updateBalance();
            updatePiggyBalance();
            closeModal();
            showNotification(`🔨 Копилка разбита! ${amount} баллов возвращено на баланс!`);
            playClickSound();
        }

        function openSettings() {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            const gradientColors = data.settings.gradientColors || [];
            let gradientHtml = '';
            if (gradientColors.length > 0) {
                gradientHtml = gradientColors.map((color, i) => `
                    <div class="color-input-wrapper">
                        <input type="color" value="${color}" onchange="updateGradientColor(${i}, this.value)">
                        <button class="color-move-btn" onclick="moveGradientColor(${i}, -1)" ${i === 0 ? 'disabled' : ''}>⬆</button>
                        <button class="color-move-btn" onclick="moveGradientColor(${i}, 1)" ${i === gradientColors.length - 1 ? 'disabled' : ''}>⬇</button>
                        <button class="remove-gradient-btn" onclick="removeGradientColor(${i})">✕</button>
                    </div>
                `).join('');
            }
            
            content.innerHTML = `
                <h2>⚙️ Настройки</h2>
                
                <div class="settings-group">
                    <label>Цвет фона:</label>
                    <div class="color-picker">
                        <input type="color" id="bgColor" value="${data.settings.bgColor}">
                    </div>
                </div>
                
                <div class="settings-group">
                    <label>Цвет текста:</label>
                    <div class="color-picker">
                        <input type="color" id="textColor" value="${data.settings.textColor}">
                    </div>
                </div>
                
                <div class="settings-group">
                    <label>Градиент фона (сверху вниз):</label>
                    <div class="gradient-colors" id="gradientColors">
                        ${gradientHtml || '<div style="opacity:0.5;">Нет цветов градиента</div>'}
                    </div>
                    <button class="add-gradient-btn" onclick="addGradientColor()">+ Добавить цвет</button>
                    ${gradientColors.length > 0 ? `<button class="add-gradient-btn" onclick="clearGradient()" style="margin-left:5px;">🗑️ Очистить градиент</button>` : ''}
                </div>
                
                <div class="settings-group">
                    <label>Фоновое изображение (jpg, png, gif):</label>
                    <input type="file" accept="image/*" onchange="loadBackgroundImage(this)">
                    ${data.settings.bgImage ? `<button onclick="removeBgImage()" style="margin-top:5px;">🗑️ Удалить изображение</button>` : ''}
                </div>
                
                <div class="settings-group">
                    <label>Громкость музыки:</label>
                    <div class="slider-container">
                        <input type="range" id="musicVolume" min="0" max="100" value="${data.settings.musicVolume}">
                        <span id="volumeDisplay">${data.settings.musicVolume}%</span>
                    </div>
                </div>
                
                <div class="checkbox-container">
                    <input type="checkbox" id="soundEffects" ${data.settings.soundEffects ? 'checked' : ''}>
                    <label for="soundEffects">🔊 Звуковые эффекты</label>
                </div>
                
                <button class="reset-btn" onclick="resetAll()">🔄 Сбросить все настройки и данные</button>
                
                <div class="buttons">
                    <button class="btn-primary" onclick="saveSettings()">💾 Сохранить</button>
                    <button onclick="closeModal()">❌ Закрыть</button>
                </div>
            `;
            
            document.getElementById('musicVolume').addEventListener('input', function() {
                document.getElementById('volumeDisplay').textContent = this.value + '%';
                data.settings.musicVolume = parseInt(this.value);
                updateMusicVolume();
            });
            
            modal.classList.add('active');
        }

        function saveSettings() {
            data.settings.bgColor = document.getElementById('bgColor').value;
            data.settings.textColor = document.getElementById('textColor').value;
            
            const colorInputs = document.querySelectorAll('#gradientColors input[type="color"]');
            if (colorInputs.length > 0) {
                data.settings.gradientColors = Array.from(colorInputs).map(input => input.value);
            } else {
                data.settings.gradientColors = [];
            }
            
            data.settings.musicVolume = parseInt(document.getElementById('musicVolume').value);
            data.settings.soundEffects = document.getElementById('soundEffects').checked;
            
            applySettings();
            saveData();
            closeModal();
            playClickSound();
            showNotification('✅ Настройки сохранены!');
        }

        function addGradientColor() {
            if (!data.settings.gradientColors) data.settings.gradientColors = [];
            data.settings.gradientColors.push('#3c3c3c');
            saveData();
            openSettings();
        }

        function removeGradientColor(index) {
            if (data.settings.gradientColors.length > 0) {
                data.settings.gradientColors.splice(index, 1);
                saveData();
                openSettings();
            }
        }

        function moveGradientColor(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= data.settings.gradientColors.length) return;
            const temp = data.settings.gradientColors[index];
            data.settings.gradientColors[index] = data.settings.gradientColors[newIndex];
            data.settings.gradientColors[newIndex] = temp;
            saveData();
            openSettings();
        }

        function clearGradient() {
            data.settings.gradientColors = [];
            saveData();
            openSettings();
        }

        function updateGradientColor(index, color) {
            if (data.settings.gradientColors && index < data.settings.gradientColors.length) {
                data.settings.gradientColors[index] = color;
                saveData();
                applySettings();
            }
        }

        function loadBackgroundImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    data.settings.bgImage = e.target.result;
                    saveData();
                    applySettings();
                    openSettings();
                    playClickSound();
                    showNotification('✅ Изображение загружено!');
                };
                reader.readAsDataURL(file);
            }
        }

        function removeBgImage() {
            data.settings.bgImage = null;
            saveData();
            applySettings();
            openSettings();
            playClickSound();
            showNotification('✅ Изображение удалено!');
        }

        function resetAll() {
            if (confirm('Сбросить все настройки и данные? Это действие необратимо!')) {
                data = {
                    tasks: [],
                    completed: [],
                    store: [],
                    tempTasks: [],
                    notes: [],
                    balance: 0,
                    piggyBalance: 0,
                    settings: {
                        bgColor: '#2b2b2b',
                        textColor: '#ffffff',
                        gradientColors: ['#2b2b2b', '#1a1a2e'],
                        bgImage: null,
                        musicVolume: 80,
                        soundEffects: true
                    }
                };
                saveData();
                applySettings();
                updateAll();
                updateBalance();
                updatePiggyBalance();
                closeModal();
                playClickSound();
                showNotification('✅ Все сброшено!');
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            const tabId = tab + 'Tab';
            const tabElement = document.getElementById(tabId);
            if (tabElement) {
                tabElement.classList.add('active');
            }
            
            const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
            if (btn) {
                btn.classList.add('active');
            }
            
            if (tab === 'store') renderStore();
            if (tab === 'notes') {
                const mobileContainer = document.getElementById('notesContainerMobile');
                if (mobileContainer) {
                    renderNotesMobile();
                }
            }
            playClickSound();
        }

        function renderNotesMobile() {
            const container = document.getElementById('notesContainerMobile');
            if (!container) return;
            const mainContainer = document.getElementById('notesContainer');
            if (mainContainer) {
                container.innerHTML = mainContainer.innerHTML;
            }
        }

        function updateAll() {
            renderTasks();
            renderCompleted();
            renderTemp();
            renderStore();
            renderNotes();
            renderNotesMobile();
            updatePiggyBalance();
        }

        function updateBalance() {
            const balanceEl = document.getElementById('balanceDisplay');
            balanceEl.textContent = data.balance;
            const parent = balanceEl.closest('.balance');
            if (data.balance < 0) {
                parent.classList.add('negative');
            } else {
                parent.classList.remove('negative');
            }
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            clearTimeout(notification.timeout);
            notification.timeout = setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function closeContextMenu() {
            document.getElementById('contextMenu').classList.remove('active');
            isContextOpen = false;
        }

        function init() {
            checkMobile();
            loadData();
            applySettings();
            updateAll();
            updateBalance();
            updatePiggyBalance();
            setupNotePanelResize();
            
            document.getElementById('piggyOverlay').addEventListener('click', function(e) {
                if (e.target === this) closePiggyOverlay();
            });
            
            setTimeout(() => {
                loadMusicFiles();
            }, 500);
            
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.context-menu')) {
                    closeContextMenu();
                }
            });
            
            document.getElementById('modal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
            
            window.addEventListener('resize', function() {
                const wasMobile = isMobile;
                checkMobile();
                if (wasMobile !== isMobile) {
                    updateAll();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
