<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Менеджер заданий</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #2b2b2b;
            touch-action: manipulation;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 10px;
            color: var(--text-color, #ffffff);
            position: relative;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: var(--bg-color, #2b2b2b);
        }

        .gradient-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: var(--gradient, none);
            pointer-events: none;
        }

        .image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background-size: cover;
            background-position: center;
            background-image: var(--bg-image, none);
            pointer-events: none;
            opacity: 0.8;
        }

        .app-content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .balance {
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 8px;
            transition: background 0.3s;
            display: inline-block;
            color: var(--text-color, #ffffff);
        }

        .balance:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .balance.negative {
            color: #ff6b6b;
        }

        .settings-btn {
            font-size: 24px;
            background: none;
            border: none;
            color: var(--text-color, #ffffff);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
            z-index: 5;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .music-player {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 8px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .music-player button {
            background: none;
            border: 2px solid var(--text-color, #ffffff);
            color: var(--text-color, #ffffff);
            font-size: 20px;
            padding: 5px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 60px;
        }

        .music-player button:hover {
            background: var(--text-color, #ffffff);
            color: var(--bg-color, #2b2b2b);
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .tab-btn {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid var(--text-color, #ffffff);
            color: var(--text-color, #ffffff);
            cursor: pointer;
            border-radius: 5px 5px 0 0;
            transition: all 0.3s;
            flex: 1;
            min-width: 80px;
            font-size: 13px;
        }

        .tab-btn.active {
            background: var(--text-color, #ffffff);
            color: var(--bg-color, #2b2b2b);
        }

        .tab-btn:hover {
            opacity: 0.8;
        }

        .tab-content {
            flex: 1;
            display: none;
            gap: 10px;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 0 0 10px 10px;
            overflow: hidden;
            padding: 10px;
            min-height: 0;
        }

        .tab-content.active {
            display: flex;
        }

        .main-layout {
            display: flex;
            flex: 1;
            gap: 10px;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        .table-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
            position: relative;
            min-height: 0;
        }

        .table-container {
            flex: 1;
            overflow: auto;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-color, #ffffff);
            font-size: 14px;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        th {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 2px solid var(--text-color, #ffffff);
            background: rgba(0, 0, 0, 0.3);
            font-size: 13px;
            white-space: nowrap;
            color: var(--text-color, #ffffff);
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            cursor: default;
            font-size: 13px;
            word-break: break-word;
            color: var(--text-color, #ffffff);
        }

        .draggable-row {
            cursor: grab;
        }

        .draggable-row:active {
            cursor: grabbing;
        }

        .dragging {
            opacity: 0.5;
        }

        .drag-over {
            border-top: 2px solid var(--text-color, #ffffff);
        }

        .status-checkbox {
            cursor: pointer;
            font-size: 18px;
            text-align: center;
            padding: 3px;
            display: inline-block;
            width: 28px;
            height: 28px;
            line-height: 28px;
            text-align: center;
            border-radius: 4px;
            transition: background 0.2s;
            color: var(--text-color, #ffffff);
        }

        .status-checkbox:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .empty-row td {
            color: rgba(255, 255, 255, 0.3);
            font-style: italic;
            cursor: pointer;
        }

        .completed-row td {
            opacity: 0.7;
        }

        .completed-row .status-checkbox {
            cursor: pointer;
            opacity: 0.7;
        }

        .completed-row .status-checkbox:hover {
            background: rgba(255, 255, 255, 0.1);
            opacity: 1;
        }

        .completed-row .task-name {
            cursor: pointer;
        }

        .completed-row .task-name:hover {
            text-decoration: underline;
        }

        .delete-btn {
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.2s;
            text-align: center;
            font-size: 16px;
            padding: 0 5px;
            color: var(--text-color, #ffffff);
        }

        .delete-btn:hover {
            opacity: 1;
        }

        .status-failed {
            color: #ff6b6b;
            text-align: center;
            font-size: 18px;
        }

        .status-buttons {
            display: flex;
            gap: 5px;
            justify-content: center;
            align-items: center;
        }

        .status-btn {
            cursor: pointer;
            font-size: 18px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.2s;
            display: inline-block;
        }

        .status-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .status-btn.complete {
            color: #51cf66;
        }

        .status-btn.fail {
            color: #ff6b6b;
        }

        .store-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            align-content: start;
        }

        .store-item {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(5px);
            border: 2px solid var(--text-color, #ffffff);
            border-radius: 10px;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 80px;
            padding: 10px;
            position: relative;
            color: var(--text-color, #ffffff);
        }

        .store-item:hover {
            transform: scale(1.05);
        }

        .store-item .item-name {
            display: none;
        }

        .store-item .item-cost {
            font-size: 14px;
            margin-top: 3px;
        }

        .store-item.add-btn {
            font-size: 40px;
            border-style: dashed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 12px;
            min-width: 280px;
            max-width: 500px;
            border: 1px solid #ffffff;
            color: #ffffff !important;
            max-height: 90vh;
            overflow-y: auto;
            width: 100%;
        }

        .modal-content * {
            color: #ffffff !important;
        }

        .modal-content h2 {
            margin-bottom: 15px;
            text-align: center;
            font-size: 20px;
        }

        .modal-content label {
            display: block;
            margin: 8px 0 4px;
            font-size: 14px;
        }

        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff !important;
            border: 1px solid #ffffff;
            border-radius: 5px;
            font-size: 14px;
        }

        .modal-content input:focus,
        .modal-content select:focus,
        .modal-content textarea:focus {
            outline: 2px solid #ffffff;
            outline-offset: 2px;
        }

        .modal-content .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .modal-content .buttons button {
            padding: 8px 18px;
            border: 1px solid #ffffff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff !important;
            font-size: 14px;
        }

        .modal-content .buttons .btn-primary {
            background: #ffffff;
            color: #2b2b2b !important;
        }

        .modal-content .buttons .btn-primary:hover {
            opacity: 0.8;
        }

        .modal-content .buttons .btn-danger {
            border-color: #ff4444;
            color: #ff4444 !important;
        }

        .modal-content .buttons .btn-danger:hover {
            background: #ff4444;
            color: #ffffff !important;
        }

        .modal-content .buttons button:hover {
            opacity: 0.8;
        }

        .settings-group {
            margin: 12px 0;
        }

        .color-picker {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-picker input[type="color"] {
            width: 40px;
            height: 40px;
            border: 2px solid #ffffff;
            border-radius: 5px;
            cursor: pointer;
            background: none;
            padding: 2px;
        }

        .gradient-colors {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .gradient-colors .color-input-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.08);
            padding: 5px;
            border-radius: 5px;
        }

        .gradient-colors .color-input-wrapper input[type="color"] {
            width: 30px;
            height: 30px;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .gradient-colors .color-move-btn {
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            font-size: 14px;
            padding: 0 3px;
            opacity: 0.5;
        }

        .gradient-colors .color-move-btn:hover {
            opacity: 1;
        }

        .gradient-colors .remove-gradient-btn {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 16px;
        }

        .add-gradient-btn {
            background: none;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #ffffff;
            border-radius: 3px;
            outline: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .checkbox-container input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .reset-btn:hover {
            opacity: 0.8;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 25px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--text-color, #ffffff);
            border-radius: 10px;
            z-index: 2000;
            display: none;
            animation: slideDown 0.3s ease;
            max-width: 90%;
            color: var(--text-color, #ffffff);
            font-size: 14px;
            text-align: center;
        }

        .notification.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-color, #ffffff);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            opacity: 0.8;
        }

        .context-menu {
            display: none;
            position: fixed;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--text-color, #ffffff);
            border-radius: 8px;
            padding: 5px 0;
            z-index: 3000;
            min-width: 160px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .context-menu.active {
            display: block;
        }

        .context-menu-item {
            padding: 10px 18px;
            cursor: pointer;
            transition: background 0.3s;
            color: var(--text-color, #ffffff);
            font-size: 14px;
        }

        .context-menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .context-menu-item.danger {
            color: #ff4444;
        }

        .context-menu-item.danger:hover {
            background: rgba(255, 68, 68, 0.2);
        }

        /* ЗАМЕТКИ */
        .notes-container {
            position: relative;
            flex: 1;
            min-height: 200px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .note-item-free {
            position: absolute;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            padding: 8px;
            min-width: 100px;
            min-height: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: grab;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: box-shadow 0.2s;
            z-index: 5;
        }

        .note-item-free:hover {
            border-color: var(--text-color, #ffffff);
            box-shadow: 0 6px 25px rgba(0,0,0,0.3);
        }

        .note-item-free.dragging {
            opacity: 0.7;
            z-index: 20;
            cursor: grabbing;
        }

        .note-item-free textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-color, #ffffff);
            resize: none;
            font-family: inherit;
            font-size: 13px;
            min-height: 35px;
            outline: none;
            padding: 5px;
        }

        .note-item-free .note-delete {
            position: absolute;
            top: 2px;
            right: 5px;
            background: none;
            border: none;
            color: var(--text-color, #ffffff);
            cursor: pointer;
            font-size: 14px;
            opacity: 0.5;
            padding: 2px 5px;
            z-index: 25;
        }

        .note-item-free .note-delete:hover {
            opacity: 1;
        }

        .note-item-free .note-resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 15px;
            height: 15px;
            cursor: nw-resize;
            opacity: 0.3;
            z-index: 25;
        }

        .note-item-free .note-resize-handle:hover {
            opacity: 1;
        }

        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px 8px 0 0;
            flex-shrink: 0;
        }

        .notes-header h3 {
            font-size: 15px;
        }

        .add-note-btn {
            background: none;
            border: 1px solid var(--text-color, #ffffff);
            color: var(--text-color, #ffffff);
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }

        .add-note-btn:hover {
            background: var(--text-color, #ffffff);
            color: var(--bg-color, #2b2b2b);
        }

        .notes-panel {
            width: 320px;
            min-width: 200px;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            flex-shrink: 0;
        }

        .notes-panel .resize-handle {
            position: absolute;
            left: -3px;
            top: 0;
            width: 6px;
            height: 100%;
            cursor: col-resize;
            background: transparent;
        }

        .notes-panel .resize-handle:hover {
            background: var(--text-color, #ffffff);
            opacity: 0.3;
        }

        .notes-tab-btn {
            display: none;
        }

        .notes-tab-content {
            display: none;
            flex: 1;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 0 0 10px 10px;
            overflow: hidden;
            padding: 10px;
        }

        .notes-tab-content.active {
            display: flex;
        }

        .notes-tab-content .notes-container {
            flex: 1;
            min-height: 300px;
        }

        .notes-tab-content .notes-header {
            flex-shrink: 0;
        }

        /* Копилка - overlay */
        .piggy-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            z-index: 500;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .piggy-overlay.active {
            display: flex;
        }

        .piggy-overlay .piggy-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            max-width: 500px;
            width: 100%;
            padding: 30px;
            background: rgba(20, 20, 30, 0.6);
            border-radius: 20px;
            border: 1px solid #ffffff;
        }

        .piggy-overlay .piggy-content * {
            color: #ffffff !important;
        }

        .piggy-overlay .piggy-icon {
            font-size: 120px;
            cursor: pointer;
            transition: transform 0.3s;
            user-select: none;
        }

        .piggy-overlay .piggy-icon:hover {
            transform: scale(1.1);
        }

        .piggy-overlay .piggy-icon:active {
            transform: scale(0.95);
        }

        .piggy-overlay .piggy-balance {
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            color: #ffffff !important;
        }

        .piggy-overlay .piggy-actions {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .piggy-overlay .piggy-actions button {
            background: none;
            border: 2px solid #ffffff;
            color: #ffffff !important;
            font-size: 28px;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 55px;
        }

        .piggy-overlay .piggy-actions button:hover {
            background: #ffffff;
            color: #2b2b2b !important;
        }

        .piggy-overlay .piggy-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            cursor: pointer;
            color: #ffffff;
            opacity: 0.5;
            transition: opacity 0.3s;
            background: none;
            border: none;
        }

        .piggy-overlay .piggy-close:hover {
            opacity: 1;
        }

        /* Мобильная версия */
        .is-mobile .notes-panel {
            display: none !important;
        }

        .is-mobile .notes-tab-btn {
            display: flex !important;
        }

        .is-mobile .piggy-icon {
            font-size: 80px !important;

        .is-mobile .piggy-actions button {
            font-size: 22px !important;
            padding: 8px 14px !important;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .store-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .tab-btn {
                font-size: 11px;

                font-size: 16px;

            .piggy-overlay .piggy-balance {

        @media (max-width: 480px) {
            .store-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .top-panel {
                flex-direction: row;
                gap: 5px;

            .tabs {
                gap: 3px;
            }

                font-size: 10px;

            }

                padding: 15px;

            .modal-content h2 {
                font-size: 17px;

            .music-player button {

            }

                font-size: 60px !important;
            }
            .piggy-overlay .piggy-balance {
                font-size: 18px !important;
            }
            .piggy-overlay .piggy-actions button {
                font-size: 18px !important;
                padding: 6px 10px !important;
                min-width: 40px;
            }
        }

        @media (pointer: coarse) {
            .draggable-row {
                cursor: default;
            }
            .draggable-row:active {
                cursor: default;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="bg-layer" id="bgLayer"></div>
        <div class="gradient-layer" id="gradientLayer"></div>
        <div class="image-layer" id="imageLayer"></div>
        
        <div class="app-content">
            <div class="top-panel">
                <div class="balance" id="balanceBtn" onclick="togglePiggyOverlay(event)">💰 Баланс: <span id="balanceDisplay">0</span></div>

            </div>

            <div class="music-player">
                <button onclick="prevSong()">⏮</button>
                <button onclick="togglePlay()" id="playBtn">⏸</button>
                <button onclick="nextSong()">⏭</button>

            <div class="tabs" id="mainTabs">
                <button class="tab-btn active" data-tab="tasks" onclick="switchTab('tasks')">📋 Задания</button>
                <button class="tab-btn" data-tab="completed" onclick="switchTab('completed')">✅ Завершённые</button>
                <button class="tab-btn" data-tab="store" onclick="switchTab('store')">🏪 Магазин</button>
                <button class="tab-btn" data-tab="temp" onclick="switchTab('temp')">⏰ Временные</button>
                <button class="tab-btn notes-tab-btn" data-tab="notes" onclick="switchTab('notes')">📝 Заметки</button>
            </div>

            <div id="tasksTab" class="tab-content active">
                <div class="main-layout">
                    <div class="table-wrapper">
                        <div class="table-container" id="tasksContainer">
                            <table id="tasksTable">
                                <thead>
                                    <tr>
                                        <th style="width: 25px;">#</th>
                                        <th>Задания</th>
                                        <th style="width: 80px;">Награда</th>
                                        <th style="width: 50px;">Статус</th>
                                        <th style="width: 30px;"></th>
                                    </tr>
                                </thead>
                                <tbody id="tasksBody"></tbody>
                            </table>

                    </div>
                    <div class="notes-panel" id="notesPanel">
                        <div class="resize-handle" id="resizeHandle"></div>
                        <div class="notes-header">
                            <h3>📝 Заметки</h3>

                        <div class="notes-container" id="notesContainer"></div>

            <div id="completedTab" class="tab-content">
                <div class="main-layout">
                    <div class="table-wrapper">
                        <div class="table-container" id="completedContainer">
                            <table id="completedTable">
                                <thead>
                                    <tr>
                                        <th style="width: 25px;">#</th>
                                        <th>Задания</th>
                                        <th style="width: 80px;">Награда</th>
                                        <th style="width: 50px;">Статус</th>
                                        <th style="width: 30px;"></th>

                            <h3>📝 Заметки</h3>

                <div class="main-layout">
                    <div class="table-wrapper">
                        <div class="table-container" id="tempContainer">
                            <table id="tempTable">
                                <thead>
                                    <tr>
                                        <th style="width: 25px;">#</th>
                                        <th>Задания</th>
                                        <th style="width: 80px;">Награда</th>
                                        <th style="width: 80px;">Статус</th>
                                        <th style="width: 150px;">Дедлайн</th>
                                        <th style="width: 30px;"></th>

                                </thead>
                                <tbody id="tempBody"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="notes-panel">
                        <div class="resize-handle" id="resizeHandle3"></div>
                        <div class="notes-header">
                            <h3>📝 Заметки</h3>
                            <button class="add-note-btn" onclick="addNote()">+</button>

                        <div class="notes-container" id="notesContainer3"></div>

            <div id="notesTab" class="tab-content notes-tab-content">

                    <h3>📝 Заметки</h3>
                    <button class="add-note-btn" onclick="addNote()">+</button>

    <!-- Копилка overlay -->
    <div class="piggy-overlay" id="piggyOverlay">
        <button class="piggy-close" onclick="closePiggyOverlay()">✕</button>
        <div class="piggy-content">
            <div class="piggy-balance">🐷 В копилке: <span id="piggyBalanceDisplay">0</span></div>
            <div class="piggy-icon" id="piggyIcon" onclick="handlePiggyClick()">🐷</div>
            <div class="piggy-actions">
                <button onclick="openPiggyWithdraw()">✏️</button>
                <button onclick="openPiggyBreak()">🔨</button>
            </div>
        </div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" onclick="contextEdit()">✏️ Редактировать</div>
        <div class="context-menu-item danger" onclick="contextDelete()">🗑️ Удалить</div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        let data = {
            tasks: [],
            completed: [],
            store: [],
            tempTasks: [],
            notes: [],
            balance: 0,
            piggyBalance: 0,
            settings: {
                bgColor: '#2b2b2b',
                textColor: '#ffffff',
                gradientColors: ['#2b2b2b', '#1a1a2e'],
                bgImage: null,
                musicVolume: 80,
                soundEffects: true
            }
        };

        let contextType = null;
        let contextIndex = null;
        let isContextOpen = false;
        let isMobile = false;
        let piggyOverlayOpen = false;

        function checkMobile() {
            const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            const isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            isMobile = isTouch || isMobileUA || window.innerWidth < 768;
            
            if (isMobile) {
                document.getElementById('app').classList.add('is-mobile');
            }
            return isMobile;
        }

        let audioContext = null;

        function playClickSound() {
            if (!data.settings.soundEffects) return;
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.value = 0.12;
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.05);
            } catch (e) {}
        }

        let musicFiles = [];
        let currentMusicIndex = 0;
        let isPlaying = false;
        let musicAudio = null;
        let musicLoaded = false;

        function loadMusicFiles() {
            musicFiles = [];
            const urls = [];
            for (let i = 1; i <= 10; i++) {
                urls.push(`songs/background${i}.mp3`);
            }
            urls.push('songs/background.mp3');
            
            let loaded = 0;
            urls.forEach(url => {
                fetch(url, { method: 'HEAD' })
                    .then(res => {
                        if (res.ok && !musicFiles.includes(url)) {
                            musicFiles.push(url);
                        }
                        loaded++;
                        if (loaded === urls.length && musicFiles.length > 0 && !musicLoaded) {
                            musicLoaded = true;
                            playSong(0);
                        }
                    })
                    .catch(() => {
                        loaded++;
                        if (loaded === urls.length && musicFiles.length > 0 && !musicLoaded) {
                            musicLoaded = true;
                            playSong(0);
                        }
                    });
            });
        }

        function playSong(index) {
            if (musicFiles.length === 0 || index >= musicFiles.length) return;
            try {
                if (musicAudio) {
                    musicAudio.pause();
                    musicAudio = null;
                }
                musicAudio = new Audio(musicFiles[index]);
                musicAudio.volume = Math.min(1, data.settings.musicVolume / 80);
                musicAudio.addEventListener('ended', () => {
                    nextSong();
                });
                musicAudio.load();
                musicAudio.play().catch(() => {});
                currentMusicIndex = index;
                isPlaying = true;
                document.getElementById('playBtn').textContent = '⏸';
            } catch (e) {}
        }

        function togglePlay() {
            if (musicFiles.length === 0) {
                loadMusicFiles();
                return;
            }
            if (isPlaying) {
                if (musicAudio) {
                    musicAudio.pause();
                    isPlaying = false;
                    document.getElementById('playBtn').textContent = '▶';
                }
            } else {
                if (musicAudio) {
                    musicAudio.play().catch(() => {});
                    isPlaying = true;
                    document.getElementById('playBtn').textContent = '⏸';
                } else {
                    playSong(currentMusicIndex);
                }
            }
        }

        function nextSong() {
            if (musicFiles.length === 0) return;
            const next = (currentMusicIndex + 1) % musicFiles.length;
            playSong(next);
        }

        function prevSong() {
            if (musicFiles.length === 0) return;
            const prev = (currentMusicIndex - 1 + musicFiles.length) % musicFiles.length;
            playSong(prev);
        }

        function updateMusicVolume() {
            if (musicAudio) {
                musicAudio.volume = Math.min(1, data.settings.musicVolume / 80);
            }
        }

        function saveData() {
            try {
                localStorage.setItem('taskManagerData', JSON.stringify(data));
            } catch (e) {}
        }

        function loadData() {
            try {
                const saved = localStorage.getItem('taskManagerData');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    data = parsed;
                    if (!data.tempTasks) data.tempTasks = [];
                    if (!data.notes) data.notes = [];
                    if (!data.piggyBalance) data.piggyBalance = 0;
                    if (!data.settings) {
                        data.settings = {
                            bgColor: '#2b2b2b',
                            textColor: '#ffffff',
                            gradientColors: ['#2b2b2b', '#1a1a2e'],
                            bgImage: null,
                            musicVolume: 80,
                            soundEffects: true
                        };
                    }
                    if (!data.settings.gradientColors) {
                        data.settings.gradientColors = ['#2b2b2b', '#1a1a2e'];
                    }
                    if (!data.settings.musicVolume) {
                        data.settings.musicVolume = 80;
                    }
                    applySettings();
                    updateAll();
                    updateBalance();
                    updatePiggyBalance();
                }
            } catch (e) {}
        }

        function applySettings() {
            document.getElementById('bgLayer').style.backgroundColor = data.settings.bgColor;
            
            const gradientLayer = document.getElementById('gradientLayer');
            if (data.settings.gradientColors && data.settings.gradientColors.length > 1) {
                const gradient = `linear-gradient(to bottom, ${data.settings.gradientColors.join(', ')})`;
                gradientLayer.style.background = gradient;
                gradientLayer.style.display = 'block';
            } else {
                gradientLayer.style.display = 'none';
            }
            
            const imageLayer = document.getElementById('imageLayer');
            if (data.settings.bgImage) {
                imageLayer.style.backgroundImage = `url(${data.settings.bgImage})`;
                imageLayer.style.display = 'block';
            } else {
                imageLayer.style.display = 'none';
            }
            
            document.documentElement.style.setProperty('--text-color', data.settings.textColor);
            document.documentElement.style.setProperty('--bg-color', data.settings.bgColor);
            updateMusicVolume();
        }

        function renderTasks() {
            renderTable('tasksBody', data.tasks, 'tasks', false, true);
        }

        function renderCompleted() {
            renderTable('completedBody', data.completed, 'completed', true, false);
        }

        function renderTemp() {
            renderTable('tempBody', data.tempTasks, 'temp', false, true);
        }

        function renderTable(bodyId, tasks, type, isCompleted, showEmpty) {
            const tbody = document.getElementById(bodyId);
            if (!tbody) return;
            
            let html = '';
            tasks.forEach((task, index) => {
                let statusHtml = '';
                if (type === 'temp') {
                    if (task.status === 'failed') {
                        statusHtml = `<td class="status-failed">❌</td>`;
                    } else if (task.status === true) {
                        statusHtml = `<td style="text-align:center; font-size:18px;">✅</td>`;
                    } else {
                        statusHtml = `
                            <td>
                                <div class="status-buttons">
                                    <span class="status-btn complete" onclick="toggleTask('temp', ${index})">☐</span>
                                    <span class="status-btn fail" onclick="failTask(${index})">✕</span>
                                </div>
                            </td>
                        `;
                    }
                } else {
                    const statusSymbol = task.status ? '✅' : '☐';
                    let clickHandler = '';
                    if (isCompleted) {
                        clickHandler = `onclick="uncompleteTask(${index})"`;
                    } else {
                        clickHandler = `onclick="toggleTask('${type}', ${index})"`;
                    }
                    statusHtml = `<td><span class="status-checkbox" ${clickHandler}>${statusSymbol}</span></td>`;
                }
                
                const rowClass = isCompleted ? 'completed-row' : 'draggable-row';
                const deadlineHtml = type === 'temp' && task.deadline ? `<td>${task.deadline || ''}</td>` : '';
                const rewardDisplay = task.reward < 0 ? task.reward : `+${task.reward}`;
                
                let rowAttrs = `class="${rowClass}" data-index="${index}" data-type="${type}"`;
                if (!isCompleted) {
                    rowAttrs += ` draggable="true" oncontextmenu="openContextMenu(event, '${type}', ${index})"`;
                }
                
                const deleteBtn = `<td class="delete-btn" onclick="deleteTask('${type}', ${index})">✕</td>`;
                
                const nameCell = isCompleted ? 
                    `<td class="task-name" onclick="showCompletedDate(${index})">${task.name || 'Новое задание'}</td>` :
                    `<td ondblclick="editTask('${type}', ${index}, 'name')">${task.name || 'Новое задание'}</td>`;
                
                html += `
                    <tr ${rowAttrs}>
                        ${!isCompleted ? `<td style="cursor: grab; text-align: center;">⠿</td>` : `<td style="text-align: center;">${index + 1}</td>`}
                        ${nameCell}
                        <td ${isCompleted ? '' : `ondblclick="editTask('${type}', ${index}, 'reward')"`}>${rewardDisplay}</td>
                        ${statusHtml}
                        ${deadlineHtml}
                        ${deleteBtn}
                    </tr>
                `;
            });
            
            if (showEmpty) {
                const emptyCols = type === 'temp' ? 6 : 5;
                const emptyClick = type === 'temp' ? `onclick="showTempTaskDialog(null)"` : `onclick="createTask('${type}')"`;
                html += `
                    <tr class="empty-row" ${emptyClick}>
                        <td></td>
                        <td colspan="${emptyCols - 1}" style="text-align: center; color: rgba(255,255,255,0.3);">
                            ✚ Нажмите для создания нового задания
                        </td>
                    </tr>
                `;
            }
            
            tbody.innerHTML = html;
            
            if (!isCompleted) {
                setupDragDrop(tbody, type);
                setupLongPress(tbody, type);
            }
        }

        function showCompletedDate(index) {
            if (index >= 0 && index < data.completed.length) {
                const task = data.completed[index];
                if (task.completedDate) {
                    const date = new Date(task.completedDate);
                    const formattedDate = date.toLocaleString('ru-RU', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    showNotification(`📅 Выполнено: ${formattedDate}`);
                } else {
                    showNotification('📅 Дата выполнения не сохранена');
                }
                playClickSound();
            }
        }

        function uncompleteTask(index) {
            if (index >= 0 && index < data.completed.length) {
                const task = data.completed[index];
                // Возвращаем баллы обратно (если награда отрицательная - возвращаем положительные)
                // Если награда была отрицательной (-N), то при возврате добавляем N баллов обратно
                const rewardAmount = Math.abs(task.reward);
                if (task.reward < 0) {
                    data.balance += rewardAmount;
                } else {
                    data.balance -= task.reward;
                }
                // Возвращаем задание обратно в список заданий
                data.tasks.push({
                    name: task.name,
                    reward: task.reward,
                    status: false
                });
                data.completed.splice(index, 1);
                saveData();
                updateAll();
                updateBalance();
                playClickSound();
                showNotification('↩️ Задание возвращено в список!');
            }
        }

        function deleteTask(type, index) {
            if (type === 'tasks' && index >= 0 && index < data.tasks.length) {
                data.tasks.splice(index, 1);
                showNotification('✅ Задание удалено!');
            } else if (type === 'completed' && index >= 0 && index < data.completed.length) {
                data.completed.splice(index, 1);
                showNotification('✅ Задание удалено!');
            } else if (type === 'temp' && index >= 0 && index < data.tempTasks.length) {
                data.tempTasks.splice(index, 1);
                showNotification('✅ Задание удалено!');
            } else if (type === 'store' && index >= 0 && index < data.store.length) {
                data.store.splice(index, 1);
                showNotification('✅ Задание удалено из магазина!');
            }
            saveData();
            updateAll();
            playClickSound();
        }

        let longPressTimer = null;
        let longPressTarget = null;

        function setupLongPress(tbody, type) {
            const rows = tbody.querySelectorAll('.draggable-row');
            rows.forEach(row => {
                row.addEventListener('mousedown', function(e) {
                    if (e.target.closest('.delete-btn')) return;
                    longPressTarget = { type, index: parseInt(this.dataset.index) };
                    longPressTimer = setTimeout(() => {
                        if (longPressTarget && !isContextOpen) {
                            isContextOpen = true;
                            openContextMenu(e, longPressTarget.type, longPressTarget.index);
                            longPressTarget = null;
                        }
                    }, 600);
                });
                
                row.addEventListener('mouseup', function() {
                    clearTimeout(longPressTimer);
                    if (!isContextOpen) {
                        longPressTarget = null;
                    }
                });
                
                row.addEventListener('mouseleave', function() {
                    clearTimeout(longPressTimer);
                    if (!isContextOpen) {
                        longPressTarget = null;
                    }
                });
                
                row.addEventListener('touchstart', function(e) {
                    if (e.target.closest('.delete-btn')) return;
                    const touch = e.touches[0];
                    longPressTarget = { type, index: parseInt(this.dataset.index) };
                    longPressTimer = setTimeout(() => {
                        if (longPressTarget && !isContextOpen) {
                            isContextOpen = true;
                            openContextMenu({ clientX: touch.clientX, clientY: touch.clientY, preventDefault: () => {} }, longPressTarget.type, longPressTarget.index);
                            longPressTarget = null;
                        }
                    }, 600);
                }, { passive: true });
                
                row.addEventListener('touchend', function() {
                    clearTimeout(longPressTimer);
                    if (!isContextOpen) {
                        longPressTarget = null;
                    }
                }, { passive: true });
                
                row.addEventListener('touchcancel', function() {
                    clearTimeout(longPressTimer);
                    longPressTarget = null;
                }, { passive: true });
            });
        }

        function openContextMenu(event, type, index) {
            event.preventDefault();
            event.stopPropagation();
            const menu = document.getElementById('contextMenu');
            contextType = type;
            contextIndex = index;
            
            let x = event.clientX || 0;
            let y = event.clientY || 0;
            
            if (x + 180 > window.innerWidth) x = window.innerWidth - 180;
            if (y + 100 > window.innerHeight) y = window.innerHeight - 100;
            
            menu.style.left = Math.max(10, x) + 'px';
            menu.style.top = Math.max(10, y) + 'px';
            menu.classList.add('active');
            isContextOpen = true;
        }

        function closeContextMenu() {
            document.getElementById('contextMenu').classList.remove('active');
            isContextOpen = false;
        }

        function contextEdit() {
            const type = contextType;
            const index = contextIndex;
            closeContextMenu();
            
            if (type && index !== null && index !== undefined) {
                if (type === 'store') {
                    editStoreItem(index);
                } else if (type === 'temp') {
                    showTempTaskDialog(index);
                } else if (type === 'tasks') {
                    showEditTaskDialog('tasks', index);
                }
            }
        }

        function contextDelete() {
            const type = contextType;
            const index = contextIndex;
            closeContextMenu();
            
            if (type && index !== null && index !== undefined) {
                deleteTask(type, index);
            }

        let dragData = null;

        function setupDragDrop(tbody, type) {
            const rows = tbody.querySelectorAll('.draggable-row');
            
            rows.forEach(row => {
                row.addEventListener('dragstart', function(e) {
                    if (e.target.closest('.delete-btn')) {
                        e.preventDefault();
                        return;
                    }
                    dragData = { type, index: parseInt(this.dataset.index) };
                    this.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });
                
                row.addEventListener('dragend', function() {
                    this.classList.remove('dragging');
                    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                });
                
                row.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                    this.classList.add('drag-over');
                });
                
                row.addEventListener('dragleave', function() {
                    this.classList.remove('drag-over');
                });
                
                row.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('drag-over');
                    if (!dragData) return;
                    
                    const targetIndex = parseInt(this.dataset.index);
                    const sourceType = dragData.type;
                    const sourceIndex = dragData.index;
                    
                    if (sourceType === type && sourceIndex !== targetIndex) {
                        const taskList = type === 'tasks' ? data.tasks : data.tempTasks;
                        if (taskList) {
                            const [moved] = taskList.splice(sourceIndex, 1);
                            taskList.splice(targetIndex, 0, moved);
                            saveData();
                            updateAll();
                        }
                    }
                    dragData = null;
                });
            });
        }

        function toggleTask(type, index) {

            if (task.status) return;
            
            if (type === 'temp' && task.deadline) {
                const now = new Date();
                const deadline = new Date(task.deadline);
                if (now > deadline) {
                    showNotification('⏰ Время вышло! Ничего страшного, в следующий раз!');
                    task.status = 'failed';
                    taskList.splice(index, 1);
                    saveData();
                    updateAll();
                    return;
                }
            }
            
            task.status = true;
            task.completedDate = new Date().toISOString();
            
            if (task.reward < 0) {
                if (data.balance < Math.abs(task.reward)) {
                    showNotification(`❌ Недостаточно баллов! Нужно: ${Math.abs(task.reward)}`);
                    task.status = false;
                    delete task.completedDate;
                    return;
                }
                data.balance += task.reward;
                showNotification(`🎉 Вы потратили ${Math.abs(task.reward)} баллов на "${task.name}"! Молодцы что накопили на него!`);
            } else {
                data.balance += task.reward;
                const rewardText = task.reward >= 0 ? `+${task.reward}` : `${task.reward}`;
                showNotification(`🎉 Молодец! Вот твоя награда: ${rewardText} баллов!`);
            }
            
            data.completed.push({...task, status: true});
            taskList.splice(index, 1);
            
            saveData();
            updateAll();
            updateBalance();
            playClickSound();
        }

        function renderNotes() {
            const containers = document.querySelectorAll('.notes-container');
            containers.forEach(container => {
                container.innerHTML = '';
                const sortedNotes = data.notes.map((note, i) => ({...note, index: i}));
                sortedNotes.forEach((note, idx) => {
                    const div = document.createElement('div');
                    div.className = 'note-item-free';
                    div.dataset.index = note.index;
                    div.style.left = (note.x || 10 + idx * 15) + 'px';
                    div.style.top = (note.y || 10 + idx * 20) + 'px';
                    div.style.width = (note.width || 180) + 'px';
                    div.style.height = (note.height || 120) + 'px';
                    div.style.zIndex = note.zIndex || 5 + idx;
                    div.innerHTML = `
                        <button class="note-delete" onclick="deleteNote(${note.index})">✕</button>
                        <textarea oninput="updateNoteText(${note.index}, this.value)" 
                                  style="min-height: ${(note.height || 120) - 20}px;">${note.text || ''}</textarea>
                        <div class="note-resize-handle" onmousedown="startNoteResize(event, ${note.index})"></div>
                    `;
                    
                    let isDragging = false;
                    let startX, startY, origX, origY;
                    
                    const startDrag = function(e) {
                        if (e.target.closest('.note-delete') || e.target.closest('.note-resize-handle') || e.target.tagName === 'TEXTAREA') return;
                        
                        const maxZ = Math.max(20, ...data.notes.map(n => n.zIndex || 5));
                        data.notes[note.index].zIndex = maxZ + 1;
                        div.style.zIndex = maxZ + 1;
                        
                        isDragging = true;
                        const clientX = e.clientX || e.touches?.[0]?.clientX || 0;
                        const clientY = e.clientY || e.touches?.[0]?.clientY || 0;
                        startX = clientX;
                        startY = clientY;
                        origX = parseInt(div.style.left);
                        origY = parseInt(div.style.top);
                        div.classList.add('dragging');
                        e.preventDefault?.();
                    };
                    
                    const moveDrag = function(e) {
                        if (!isDragging) return;
                        const clientX = e.clientX || e.touches?.[0]?.clientX || 0;
                        const clientY = e.clientY || e.touches?.[0]?.clientY || 0;
                        const dx = clientX - startX;
                        const dy = clientY - startY;
                        const containerRect = container.getBoundingClientRect();
                        const newX = Math.max(0, Math.min(containerRect.width - parseInt(div.style.width) || 180, origX + dx));
                        const newY = Math.max(0, Math.min(containerRect.height - parseInt(div.style.height) || 120, origY + dy));
                        div.style.left = newX + 'px';
                        div.style.top = newY + 'px';
                        if (note.index < data.notes.length) {
                            data.notes[note.index].x = newX;
                            data.notes[note.index].y = newY;
                        }
                    };
                    
                    const endDrag = function() {
                        if (isDragging) {
                            isDragging = false;
                            div.classList.remove('dragging');
                            saveData();
                        }
                    };
                    
                    div.addEventListener('mousedown', startDrag);
                    document.addEventListener('mousemove', moveDrag);
                    document.addEventListener('mouseup', endDrag);
                    
                    div.addEventListener('touchstart', startDrag, { passive: true });
                    document.addEventListener('touchmove', moveDrag, { passive: true });
                    document.addEventListener('touchend', endDrag, { passive: true });
                    
                    container.appendChild(div);
                });
            });
        }

        function startNoteResize(event, index) {
            event.preventDefault();
            event.stopPropagation();
            const note = event.target.closest('.note-item-free');
            const startX = event.clientX || event.touches?.[0]?.clientX || 0;
            const startY = event.clientY || event.touches?.[0]?.clientY || 0;
            const startWidth = parseInt(note.style.width) || 180;
            const startHeight = parseInt(note.style.height) || 120;
            
            function onMove(e) {
                const clientX = e.clientX || e.touches?.[0]?.clientX || 0;
                const clientY = e.clientY || e.touches?.[0]?.clientY || 0;
                const newWidth = Math.max(100, startWidth + (clientX - startX));
                const newHeight = Math.max(50, startHeight + (clientY - startY));
                note.style.width = newWidth + 'px';
                note.style.height = newHeight + 'px';
                if (index < data.notes.length) {
                    data.notes[index].width = newWidth;
                    data.notes[index].height = newHeight;
                }
            }
            
            function onUp() {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onUp);
                saveData();
            }
            
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
            document.addEventListener('touchmove', onMove, { passive: true });
            document.addEventListener('touchend', onUp, { passive: true });
        }

                    }
                    
                    function onUp() {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                    }
                    
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            });
        }
