<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Менеджер заданий</title>
    <style>
        /* ===== СТИЛИ ДЛЯ НАСТРОЕК ===== */
        
        .settings-group {
            margin: 15px 0;
        }
        
        .settings-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .color-picker-wrapper input[type="color"] {
            width: 40px;
            height: 40px;
            border: 2px solid #ffffff;
            border-radius: 5px;
            cursor: pointer;
            background: none;
            padding: 2px;
        }
        
        .color-picker-wrapper input[type="text"] {
            width: 100px;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff !important;
            border: 1px solid #ffffff;
            border-radius: 5px;
            font-size: 13px;
            font-family: monospace;
            text-transform: uppercase;
        }
        
        .color-picker-wrapper input[type="text"]:focus {
            outline: 2px solid #ffffff;
            outline-offset: 2px;
        }
        
        /* Градиент */
        .gradient-colors {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .gradient-colors .color-input-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.08);
            padding: 5px;
            border-radius: 5px;
        }
        
        .gradient-colors .color-input-wrapper input[type="color"] {
            width: 30px;
            height: 30px;
            border: none;
            cursor: pointer;
            padding: 0;
        }
        
        .gradient-colors .color-input-wrapper input[type="text"] {
            width: 60px;
            padding: 4px 6px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff !important;
            border: 1px solid #ffffff;
            border-radius: 3px;
            font-size: 11px;
            font-family: monospace;
            text-transform: uppercase;
        }
        
        .gradient-colors .color-input-wrapper input[type="text"]:focus {
            outline: 2px solid #ffffff;
            outline-offset: 2px;
        }
        
        .gradient-colors .color-move-btn {
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            font-size: 14px;
            padding: 0 3px;
            opacity: 0.5;
        }
        
        .gradient-colors .color-move-btn:hover {
            opacity: 1;
        }
        
        .gradient-colors .remove-gradient-btn {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 16px;
        }
        
        .add-gradient-btn {
            background: none;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }
        
        /* Ползунок */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .slider-container input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #ffffff;
            border-radius: 3px;
            outline: none;
        }
        
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
        }
        
        /* Чекбокс */
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        
        .checkbox-container input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        /* Кнопки */
        .settings-btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        
        .settings-btn-group button {
            flex: 1;
            min-width: 120px;
            padding: 10px 15px;
            border: 1px solid #ffffff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff !important;
            font-size: 14px;
        }
        
        .settings-btn-group button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .settings-btn-group button.btn-primary {
            background: #ffffff;
            color: #2b2b2b !important;
        }
        
        .settings-btn-group button.btn-danger {
            border-color: #ff4444;
            color: #ff4444 !important;
        }
        
        .settings-btn-group button.btn-danger:hover {
            background: #ff4444;
            color: #ffffff !important;
        }
        
        .reset-btn {
            width: 100%;
            padding: 12px;
            background: #8B0000;
            color: white !important;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .reset-btn:hover {
            opacity: 0.8;
        }
        
        /* Список музыки */
        .music-list {
            margin: 10px 0;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .music-list .music-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
        }
        
        .music-list .music-item .music-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .music-list .music-item .music-remove {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 16px;
            padding: 0 5px;
        }
        
        .music-list .music-item .music-remove:hover {
            opacity: 0.8;
        }
        
        .file-input-wrapper {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .file-input-wrapper input[type="file"] {
            flex: 1;
            min-width: 150px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff !important;
            border: 1px solid #ffffff;
            border-radius: 5px;
            font-size: 13px;
        }
        
        .file-input-wrapper input[type="file"]::-webkit-file-upload-button {
            padding: 5px 15px;
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .file-input-wrapper input[type="file"]::-webkit-file-upload-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .file-input-wrapper button {
            padding: 8px 15px;
            border: 1px solid #ffffff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff !important;
            font-size: 13px;
            white-space: nowrap;
        }
        
        .file-input-wrapper button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .file-input-wrapper button.btn-primary {
            background: #ffffff;
            color: #2b2b2b !important;
        }
        
        .backup-section {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 15px;
            margin-top: 15px;
        }
        
        .backup-section h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .backup-section .backup-info {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- ... Остальной HTML ... -->

    <script>
        // ===== ДАННЫЕ =====
        let data = {
            tasks: [],
            completed: [],
            store: [],
            tempTasks: [],
            notes: [],
            balance: 0,
            piggyBalance: 0,
            settings: {
                bgColor: '#2b2b2b',
                textColor: '#ffffff',
                gradientColors: ['#2b2b2b', '#1a1a2e'],
                bgImage: null,
                musicVolume: 100,
                soundEffects: true,
                customMusic: [] // Массив пользовательских треков
            }
        };

        // ===== МУЗЫКА =====
        let musicFiles = [];
        let currentMusicIndex = 0;
        let isPlaying = false;
        let musicAudio = null;
        let musicLoaded = false;

        // Загрузка музыки из папки songs и пользовательских треков
        function loadMusicFiles() {
            musicFiles = [];
            
            // Добавляем пользовательские треки
            if (data.settings.customMusic && data.settings.customMusic.length > 0) {
                data.settings.customMusic.forEach(track => {
                    if (track.data) {
                        musicFiles.push(track.data);
                    }
                });
            }
            
            // Добавляем стандартные треки из папки songs
            const urls = [];
            for (let i = 1; i <= 10; i++) {
                urls.push(`songs/background${i}.mp3`);
            }
            urls.push('songs/background.mp3');
            
            let loaded = 0;
            urls.forEach(url => {
                fetch(url, { method: 'HEAD' })
                    .then(res => {
                        if (res.ok && !musicFiles.includes(url)) {
                            musicFiles.push(url);
                        }
                        loaded++;
                        if (loaded === urls.length && musicFiles.length > 0 && !musicLoaded) {
                            musicLoaded = true;
                            playSong(0);
                        }
                    })
                    .catch(() => {
                        loaded++;
                        if (loaded === urls.length && musicFiles.length > 0 && !musicLoaded) {
                            musicLoaded = true;
                            playSong(0);
                        }
                    });
            });
            
            // Если нет ни одной песни, но musicLoaded уже true, пробуем ещё раз
            if (musicFiles.length === 0 && !musicLoaded) {
                musicLoaded = true;
                // Пытаемся воспроизвести первую доступную песню через некоторое время
                setTimeout(() => {
                    if (musicFiles.length > 0) {
                        playSong(0);
                    }
                }, 500);
            }
        }

        function playSong(index) {
            if (musicFiles.length === 0 || index >= musicFiles.length) return;
            try {
                if (musicAudio) {
                    musicAudio.pause();
                    musicAudio = null;
                }
                musicAudio = new Audio(musicFiles[index]);
                const volume = Math.min(1, data.settings.musicVolume / 60);
                musicAudio.volume = volume;
                musicAudio.addEventListener('ended', () => {
                    nextSong();
                });
                musicAudio.load();
                musicAudio.play().catch(() => {});
                currentMusicIndex = index;
                isPlaying = true;
                const playBtn = document.getElementById('playBtn');
                if (playBtn) playBtn.textContent = '⏸';
            } catch (e) {
                console.log('Play error:', e);
            }
        }

        // ===== НАСТРОЙКИ =====
        function openSettings() {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            const gradientColors = data.settings.gradientColors || [];
            let gradientHtml = '';
            if (gradientColors.length > 0) {
                gradientHtml = gradientColors.map((color, i) => `
                    <div class="color-input-wrapper">
                        <input type="color" value="${color}" onchange="updateGradientColor(${i}, this.value)" id="gradientColor_${i}">
                        <input type="text" value="${color}" onchange="updateGradientColorFromText(${i}, this.value)" onfocus="this.select()" placeholder="#000000">
                        <button class="color-move-btn" onclick="moveGradientColor(${i}, -1)" ${i === 0 ? 'disabled' : ''}>⬆</button>
                        <button class="color-move-btn" onclick="moveGradientColor(${i}, 1)" ${i === gradientColors.length - 1 ? 'disabled' : ''}>⬇</button>
                        <button class="remove-gradient-btn" onclick="removeGradientColor(${i})">✕</button>
                    </div>
                `).join('');
            }
            
            // Список пользовательских треков
            let musicListHtml = '';
            if (data.settings.customMusic && data.settings.customMusic.length > 0) {
                musicListHtml = data.settings.customMusic.map((track, i) => `
                    <div class="music-item">
                        <span class="music-name">${track.name || 'Без названия'}</span>
                        <button class="music-remove" onclick="removeCustomMusic(${i})">✕</button>
                    </div>
                `).join('');
            } else {
                musicListHtml = '<div style="opacity:0.5; font-size:13px;">Нет добавленных треков</div>';
            }
            
            content.innerHTML = `
                <h2>⚙️ Настройки</h2>
                
                <div class="settings-group">
                    <label>Цвет фона:</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="bgColor" value="${data.settings.bgColor}" onchange="updateBgColorFromPicker(this.value)">
                        <input type="text" id="bgColorText" value="${data.settings.bgColor}" onchange="updateBgColorFromText(this.value)" onfocus="this.select()" placeholder="#000000">
                    </div>
                </div>
                
                <div class="settings-group">
                    <label>Цвет текста:</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="textColor" value="${data.settings.textColor}" onchange="updateTextColorFromPicker(this.value)">
                        <input type="text" id="textColorText" value="${data.settings.textColor}" onchange="updateTextColorFromText(this.value)" onfocus="this.select()" placeholder="#000000">
                    </div>
                </div>
                
                <div class="settings-group">
                    <label>Градиент фона (сверху вниз):</label>
                    <div class="gradient-colors" id="gradientColors">
                        ${gradientHtml || '<div style="opacity:0.5;">Нет цветов градиента</div>'}
                    </div>
                    <button class="add-gradient-btn" onclick="addGradientColor()">+ Добавить цвет</button>
                    ${gradientColors.length > 0 ? `<button class="add-gradient-btn" onclick="clearGradient()" style="margin-left:5px;">🗑️ Очистить градиент</button>` : ''}
                </div>
                
                <div class="settings-group">
                    <label>Фоновое изображение (jpg, png, gif):</label>
                    <input type="file" accept="image/*" onchange="loadBackgroundImage(this)">
                    ${data.settings.bgImage ? `<button onclick="removeBgImage()" style="margin-top:5px;">🗑️ Удалить изображение</button>` : ''}
                </div>
                
                <div class="settings-group">
                    <label>Громкость музыки:</label>
                    <div class="slider-container">
                        <input type="range" id="musicVolume" min="0" max="100" value="${data.settings.musicVolume}">
                        <span id="volumeDisplay">${data.settings.musicVolume}%</span>
                    </div>
                </div>
                
                <div class="settings-group">
                    <label>Моя музыка:</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="musicFileInput" accept="audio/*">
                        <button class="btn-primary" onclick="importCustomMusic()">➕ Добавить трек</button>
                    </div>
                    <div class="music-list" id="customMusicList">
                        ${musicListHtml}
                    </div>
                </div>
                
                <div class="checkbox-container">
                    <input type="checkbox" id="soundEffects" ${data.settings.soundEffects ? 'checked' : ''}>
                    <label for="soundEffects">🔊 Звуковые эффекты</label>
                </div>
                
                <div class="backup-section">
                    <h3>💾 Резервное копирование</h3>
                    <div class="backup-info">Сохраните все данные (задания, заметки, баланс, настройки) в файл или восстановите из файла</div>
                    <div class="settings-btn-group">
                        <button class="btn-primary" onclick="exportBackup()">📤 Экспорт</button>
                        <button onclick="document.getElementById('backupFileInput').click()">📥 Импорт</button>
                        <input type="file" id="backupFileInput" accept=".json" style="display:none" onchange="importBackup(this)">
                    </div>
                </div>
                
                <button class="reset-btn" onclick="resetAll()">🔄 Сбросить все настройки и данные</button>
                
                <div class="buttons">
                    <button class="btn-primary" onclick="saveSettings()">💾 Сохранить</button>
                    <button onclick="closeModal()">❌ Закрыть</button>
                </div>
            `;
            
            // Обработчик для ползунка громкости
            const volumeSlider = document.getElementById('musicVolume');
            if (volumeSlider) {
                volumeSlider.addEventListener('input', function() {
                    document.getElementById('volumeDisplay').textContent = this.value + '%';
                    data.settings.musicVolume = parseInt(this.value);
                    updateMusicVolume();
                });
            }
            
            modal.classList.add('active');
        }

        // ===== ИМПОРТ МУЗЫКИ =====
        function importCustomMusic() {
            const input = document.getElementById('musicFileInput');
            const file = input.files[0];
            if (!file) {
                showNotification('❌ Выберите аудиофайл!');
                return;
            }
            
            // Проверяем размер файла (максимум 10MB)
            if (file.size > 10 * 1024 * 1024) {
                showNotification('❌ Файл слишком большой! Максимум 10MB');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const audioData = e.target.result;
                const trackName = file.name.replace(/\.[^/.]+$/, ''); // Убираем расширение
                
                // Добавляем трек в список
                if (!data.settings.customMusic) {
                    data.settings.customMusic = [];
                }
                data.settings.customMusic.push({
                    name: trackName,
                    data: audioData
                });
                
                // Сохраняем и обновляем
                saveData();
                showNotification(`✅ Трек "${trackName}" добавлен!`);
                
                // Перезагружаем музыку
                musicFiles = [];
                musicLoaded = false;
                loadMusicFiles();
                
                // Обновляем настройки
                openSettings();
            };
            
            reader.onerror = function() {
                showNotification('❌ Ошибка при загрузке файла!');
            };
            
            reader.readAsDataURL(file);
        }

        function removeCustomMusic(index) {
            if (!data.settings.customMusic || index >= data.settings.customMusic.length) return;
            const trackName = data.settings.customMusic[index].name || 'Без названия';
            data.settings.customMusic.splice(index, 1);
            saveData();
            showNotification(`🗑️ Трек "${trackName}" удален`);
            
            // Перезагружаем музыку
            musicFiles = [];
            musicLoaded = false;
            loadMusicFiles();
            
            openSettings();
        }

        // ===== РЕЗЕРВНОЕ КОПИРОВАНИЕ =====

        // Экспорт данных в файл
        function exportBackup() {
            try {
                // Создаем копию данных без больших данных (изображения, музыка)
                const backupData = {
                    tasks: data.tasks,
                    completed: data.completed,
                    store: data.store,
                    tempTasks: data.tempTasks,
                    notes: data.notes,
                    balance: data.balance,
                    piggyBalance: data.piggyBalance,
                    settings: {
                        bgColor: data.settings.bgColor,
                        textColor: data.settings.textColor,
                        gradientColors: data.settings.gradientColors,
                        bgImage: data.settings.bgImage,
                        musicVolume: data.settings.musicVolume,
                        soundEffects: data.settings.soundEffects,
                        // Музыку не экспортируем (она может быть большой)
                        customMusic: data.settings.customMusic ? data.settings.customMusic.map(track => ({
                            name: track.name,
                            // Сохраняем только имена, сами файлы не экспортируем
                        })) : []
                    }
                };
                
                // Добавляем информацию о экспорте
                const exportData = {
                    version: '1.0',
                    exportDate: new Date().toISOString(),
                    data: backupData
                };
                
                const json = JSON.stringify(exportData, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                // Создаем ссылку для скачивания
                const link = document.createElement('a');
                link.href = url;
                link.download = `task_manager_backup_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                showNotification('✅ Резервная копия создана!');
                playClickSound();
            } catch (e) {
                showNotification('❌ Ошибка при создании резервной копии: ' + e.message);
                console.error('Backup error:', e);
            }
        }

        // Импорт данных из файла
        function importBackup(input) {
            const file = input.files[0];
            if (!file) {
                showNotification('❌ Выберите файл резервной копии!');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const json = JSON.parse(e.target.result);
                    
                    // Проверяем структуру данных
                    if (!json.data || !json.data.tasks || !json.data.settings) {
                        showNotification('❌ Неверный формат файла!');
                        return;
                    }
                    
                    // Проверяем версию
                    if (json.version && json.version !== '1.0') {
                        if (!confirm(`Версия файла (${json.version}) отличается от текущей. Продолжить?`)) {
                            return;
                        }
                    }
                    
                    // Подтверждение восстановления
                    if (!confirm('Восстановить данные из резервной копии? Текущие данные будут заменены!')) {
                        return;
                    }
                    
                    // Восстанавливаем данные
                    const backupData = json.data;
                    data.tasks = backupData.tasks || [];
                    data.completed = backupData.completed || [];
                    data.store = backupData.store || [];
                    data.tempTasks = backupData.tempTasks || [];
                    data.notes = backupData.notes || [];
                    data.balance = backupData.balance || 0;
                    data.piggyBalance = backupData.piggyBalance || 0;
                    
                    // Восстанавливаем настройки (кроме музыки)
                    if (backupData.settings) {
                        data.settings.bgColor = backupData.settings.bgColor || '#2b2b2b';
                        data.settings.textColor = backupData.settings.textColor || '#ffffff';
                        data.settings.gradientColors = backupData.settings.gradientColors || ['#2b2b2b', '#1a1a2e'];
                        data.settings.bgImage = backupData.settings.bgImage || null;
                        data.settings.musicVolume = backupData.settings.musicVolume || 100;
                        data.settings.soundEffects = backupData.settings.soundEffects !== undefined ? backupData.settings.soundEffects : true;
                        // Музыку не восстанавливаем (только имена треков)
                        if (backupData.settings.customMusic) {
                            data.settings.customMusic = data.settings.customMusic || [];
                            // Сохраняем только имена, так как сами файлы не экспортируются
                            // Пользователь должен будет загрузить музыку заново
                        }
                    }
                    
                    saveData();
                    applySettings();
                    updateAll();
                    updateBalance();
                    updatePiggyBalance();
                    
                    // Перезагружаем музыку
                    musicFiles = [];
                    musicLoaded = false;
                    loadMusicFiles();
                    
                    closeModal();
                    showNotification('✅ Данные восстановлены из резервной копии!');
                    playClickSound();
                    
                } catch (err) {
                    showNotification('❌ Ошибка при чтении файла: ' + err.message);
                    console.error('Import error:', err);
                }
            };
            
            reader.onerror = function() {
                showNotification('❌ Ошибка при чтении файла!');
            };
            
            reader.readAsText(file);
            
            // Сбрасываем input для возможности повторной загрузки
            input.value = '';
        }

        // ===== ОСТАЛЬНЫЕ ФУНКЦИИ НАСТРОЕК =====

        function updateBgColorFromPicker(value) {
            document.getElementById('bgColorText').value = value;
            data.settings.bgColor = value;
            applySettings();
        }

        function updateBgColorFromText(value) {
            if (/^#[0-9a-f]{6}$/i.test(value) || /^#[0-9a-f]{3}$/i.test(value)) {
                document.getElementById('bgColor').value = value;
                data.settings.bgColor = value;
                applySettings();
            }
        }

        function updateTextColorFromPicker(value) {
            document.getElementById('textColorText').value = value;
            data.settings.textColor = value;
            applySettings();
        }

        function updateTextColorFromText(value) {
            if (/^#[0-9a-f]{6}$/i.test(value) || /^#[0-9a-f]{3}$/i.test(value)) {
                document.getElementById('textColor').value = value;
                data.settings.textColor = value;
                applySettings();
            }
        }

        function addGradientColor() {
            if (!data.settings.gradientColors) data.settings.gradientColors = [];
            data.settings.gradientColors.push('#3c3c3c');
            saveData();
            openSettings();
        }

        function removeGradientColor(index) {
            if (data.settings.gradientColors.length > 0) {
                data.settings.gradientColors.splice(index, 1);
                saveData();
                openSettings();
            }
        }

        function moveGradientColor(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= data.settings.gradientColors.length) return;
            const temp = data.settings.gradientColors[index];
            data.settings.gradientColors[index] = data.settings.gradientColors[newIndex];
            data.settings.gradientColors[newIndex] = temp;
            saveData();
            openSettings();
        }

        function clearGradient() {
            data.settings.gradientColors = [];
            saveData();
            openSettings();
        }

        function updateGradientColorFromText(index, value) {
            if (/^#[0-9a-f]{6}$/i.test(value) || /^#[0-9a-f]{3}$/i.test(value)) {
                const input = document.getElementById('gradientColor_' + index);
                if (input) {
                    input.value = value;
                    data.settings.gradientColors[index] = value;
                    applySettings();
                }
            }
        }

        function updateGradientColor(index, color) {
            if (data.settings.gradientColors && index < data.settings.gradientColors.length) {
                data.settings.gradientColors[index] = color;
                const textInput = document.querySelectorAll('#gradientColors .color-input-wrapper input[type="text"]')[index];
                if (textInput) textInput.value = color;
                applySettings();
            }
        }

        function loadBackgroundImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    data.settings.bgImage = e.target.result;
                    saveData();
                    applySettings();
                    openSettings();
                    playClickSound();
                    showNotification('✅ Изображение загружено!');
                };
                reader.readAsDataURL(file);
            }
        }

        function removeBgImage() {
            data.settings.bgImage = null;
            saveData();
            applySettings();
            openSettings();
            playClickSound();
            showNotification('✅ Изображение удалено!');
        }

        function saveSettings() {
            data.settings.bgColor = document.getElementById('bgColor').value;
            data.settings.textColor = document.getElementById('textColor').value;
            
            const colorInputs = document.querySelectorAll('#gradientColors input[type="color"]');
            if (colorInputs.length > 0) {
                data.settings.gradientColors = Array.from(colorInputs).map(input => input.value);
            } else {
                data.settings.gradientColors = [];
            }
            
            data.settings.musicVolume = parseInt(document.getElementById('musicVolume').value);
            data.settings.soundEffects = document.getElementById('soundEffects').checked;
            
            applySettings();
            saveData();
            closeModal();
            playClickSound();
            showNotification('✅ Настройки сохранены!');
        }

        function resetAll() {
            if (confirm('Сбросить все настройки и данные? Это действие необратимо!')) {
                data = {
                    tasks: [],
                    completed: [],
                    store: [],
                    tempTasks: [],
                    notes: [],
                    balance: 0,
                    piggyBalance: 0,
                    settings: {
                        bgColor: '#2b2b2b',
                        textColor: '#ffffff',
                        gradientColors: ['#2b2b2b', '#1a1a2e'],
                        bgImage: null,
                        musicVolume: 100,
                        soundEffects: true,
                        customMusic: []
                    }
                };
                saveData();
                applySettings();
                updateAll();
                updateBalance();
                updatePiggyBalance();
                closeModal();
                playClickSound();
                showNotification('✅ Все сброшено!');
                
                // Перезагружаем музыку
                musicFiles = [];
                musicLoaded = false;
                loadMusicFiles();
            }
        }

        function applySettings() {
            document.getElementById('bgLayer').style.backgroundColor = data.settings.bgColor;
            
            const gradientLayer = document.getElementById('gradientLayer');
            if (data.settings.gradientColors && data.settings.gradientColors.length > 1) {
                const gradient = `linear-gradient(to bottom, ${data.settings.gradientColors.join(', ')})`;
                gradientLayer.style.background = gradient;
                gradientLayer.style.display = 'block';
            } else {
                gradientLayer.style.display = 'none';
            }
            
            const imageLayer = document.getElementById('imageLayer');
            if (data.settings.bgImage) {
                imageLayer.style.backgroundImage = `url(${data.settings.bgImage})`;
                imageLayer.style.display = 'block';
            } else {
                imageLayer.style.display = 'none';
            }
            
            document.documentElement.style.setProperty('--text-color', data.settings.textColor);
            document.documentElement.style.setProperty('--bg-color', data.settings.bgColor);
            updateMusicVolume();
        }

        function saveData() {
            try {
                localStorage.setItem('taskManagerData', JSON.stringify(data));
            } catch (e) {}
        }

        function loadData() {
            try {
                const saved = localStorage.getItem('taskManagerData');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    data = parsed;
                    if (!data.tempTasks) data.tempTasks = [];
                    if (!data.notes) data.notes = [];
                    if (!data.piggyBalance) data.piggyBalance = 0;
                    if (!data.settings) {
                        data.settings = {
                            bgColor: '#2b2b2b',
                            textColor: '#ffffff',
                            gradientColors: ['#2b2b2b', '#1a1a2e'],
                            bgImage: null,
                            musicVolume: 100,
                            soundEffects: true,
                            customMusic: []
                        };
                    }
                    if (!data.settings.gradientColors) {
                        data.settings.gradientColors = ['#2b2b2b', '#1a1a2e'];
                    }
                    if (!data.settings.musicVolume) {
                        data.settings.musicVolume = 100;
                    }
                    if (!data.settings.customMusic) {
                        data.settings.customMusic = [];
                    }
                    applySettings();
                    updateAll();
                    updateBalance();
                    updatePiggyBalance();
                }
            } catch (e) {}
        }

        function updateMusicVolume() {
            if (musicAudio) {
                const volume = Math.min(1, data.settings.musicVolume / 60);
                musicAudio.volume = volume;
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function showNotification(message, type = '') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification';
            if (type) {
                notification.classList.add(type);
            }
            notification.classList.add('show');
            clearTimeout(notification.timeout);
            notification.timeout = setTimeout(() => {
                notification.classList.remove('show');
            }, 4000);
        }

        function playClickSound() {
            if (!data.settings.soundEffects) return;
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.value = 0.3;
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.06);
            } catch (e) {}
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        function init() {
            checkMobile();
            loadData();
            applySettings();
            updateAll();
            updateBalance();
            updatePiggyBalance();
            setupNotePanelResize();
            
            document.getElementById('piggyOverlay').addEventListener('click', function(e) {
                if (e.target === this) closePiggyOverlay();
            });
            
            setTimeout(() => {
                loadMusicFiles();
            }, 500);
            
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.context-menu')) {
                    closeContextMenu();
                }
            });
            
            document.getElementById('modal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
            
            window.addEventListener('resize', function() {
                const wasMobile = isMobile;
                checkMobile();
                if (wasMobile !== isMobile) {
                    updateAll();
                }
                renderNotes();
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
