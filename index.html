<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Менеджер заданий</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #2b2b2b;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 10px;
            color: var(--text-color, #ffffff);
            position: relative;
        }

        /* Фон */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: var(--bg-color, #2b2b2b);
        }

        .gradient-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: var(--gradient, none);
            pointer-events: none;
        }

        .image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background-size: cover;
            background-position: center;
            background-image: var(--bg-image, none);
            pointer-events: none;
            opacity: 0.8;
        }

        .app-content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Верхняя панель */
        .top-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .balance {
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .settings-btn {
            font-size: 24px;
            background: none;
            border: none;
            color: var(--text-color, #ffffff);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Музыкальный плеер */
        .music-player {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 8px;
            margin-bottom: 10px;
        }

        .music-player button {
            background: none;
            border: 2px solid var(--text-color, #ffffff);
            color: var(--text-color, #ffffff);
            font-size: 20px;
            padding: 5px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 60px;
        }

        .music-player button:hover {
            background: var(--text-color, #ffffff);
            color: var(--bg-color, #2b2b2b);
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid var(--text-color, #ffffff);
            color: var(--text-color, #ffffff);
            cursor: pointer;
            border-radius: 5px 5px 0 0;
            transition: all 0.3s;
            flex: 1;
            min-width: 100px;
        }

        .tab-btn.active {
            background: var(--text-color, #ffffff);
            color: var(--bg-color, #2b2b2b);
        }

        .tab-btn:hover {
            opacity: 0.8;
        }

        /* Контент вкладок */
        .tab-content {
            flex: 1;
            display: none;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 0 0 10px 10px;
            overflow: hidden;
            padding: 10px;
        }

        .tab-content.active {
            display: flex;
        }

        /* Основной контейнер */
        .main-layout {
            display: flex;
            flex: 1;
            gap: 10px;
            overflow: hidden;
        }

        .table-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
            position: relative;
        }

        .table-container {
            flex: 1;
            overflow: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            position: relative;
        }

        /* Стрелочки навигации - статичные справа */
        .table-nav {
            display: flex;
            flex-direction: column;
            position: absolute;
            right: 5px;
            bottom: 5px;
            gap: 3px;
            z-index: 10;
        }

        .table-nav button {
            width: 36px;
            height: 28px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid var(--text-color, #ffffff);
            color: var(--text-color, #ffffff);
            cursor: pointer;
            border-radius: 3px;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .table-nav button:hover {
            background: var(--text-color, #ffffff);
            color: var(--bg-color, #2b2b2b);
        }

        /* Заметки - стикеры */
        .notes-panel {
            width: 300px;
            min-width: 150px;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: width 0.1s;
        }

        .notes-panel .resize-handle {
            position: absolute;
            left: -3px;
            top: 0;
            width: 6px;
            height: 100%;
            cursor: col-resize;
            background: transparent;
        }

        .notes-panel .resize-handle:hover {
            background: var(--text-color, #ffffff);
            opacity: 0.3;
        }

        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .notes-header h3 {
            font-size: 16px;
        }

        .add-note-btn {
            background: none;
            border: 1px solid var(--text-color, #ffffff);
            color: var(--text-color, #ffffff);
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .add-note-btn:hover {
            background: var(--text-color, #ffffff);
            color: var(--bg-color, #2b2b2b);
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 5px;
            min-height: 100px;
            position: relative;
        }

        .note-item {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            padding: 8px;
            position: relative;
            min-height: 50px;
            cursor: move;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .note-item:hover {
            border-color: var(--text-color, #ffffff);
        }

        .note-item.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .note-item.drag-over {
            border-color: var(--text-color, #ffffff);
            background: rgba(255, 255, 255, 0.25);
        }

        .note-item textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-color, #ffffff);
            resize: none;
            font-family: inherit;
            font-size: 14px;
            min-height: 40px;
            outline: none;
            padding: 5px;
        }

        .note-item .note-delete {
            position: absolute;
            top: 2px;
            right: 5px;
            background: none;
            border: none;
            color: var(--text-color, #ffffff);
            cursor: pointer;
            font-size: 14px;
            opacity: 0.5;
            padding: 2px 5px;
        }

        .note-item .note-delete:hover {
            opacity: 1;
        }

        .note-item .note-resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 15px;
            height: 15px;
            cursor: nw-resize;
            opacity: 0.3;
        }

        .note-item .note-resize-handle:hover {
            opacity: 1;
        }

        /* Таблицы */
        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-color, #ffffff);
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }

        th {
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid var(--text-color, #ffffff);
            background: rgba(0, 0, 0, 0.4);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .draggable-row {
            cursor: grab;
        }

        .draggable-row:active {
            cursor: grabbing;
        }

        .dragging {
            opacity: 0.5;
        }

        .drag-over {
            border-top: 2px solid var(--text-color, #ffffff);
        }

        .status-checkbox {
            cursor: pointer;
            font-size: 20px;
            text-align: center;
        }

        .empty-row td {
            color: rgba(255, 255, 255, 0.3);
            font-style: italic;
        }

        .completed-row td {
            opacity: 0.7;
        }

        /* Магазин */
        .store-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            align-content: start;
        }

        .store-item {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border: 2px solid var(--text-color, #ffffff);
            border-radius: 10px;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 80px;
            padding: 10px;
            position: relative;
        }

        .store-item:hover {
            transform: scale(1.05);
        }

        .store-item .item-name {
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
            word-break: break-all;
        }

        .store-item .item-cost {
            font-size: 14px;
            margin-top: 3px;
        }

        .store-item.add-btn {
            font-size: 40px;
            border-style: dashed;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 10px;
            min-width: 300px;
            max-width: 500px;
            border: 1px solid var(--text-color, #ffffff);
            color: var(--text-color, #ffffff);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content label {
            display: block;
            margin: 10px 0 5px;
        }

        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color, #ffffff);
            border: 1px solid var(--text-color, #ffffff);
            border-radius: 5px;
            font-size: 14px;
        }

        .modal-content .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .modal-content .buttons button {
            padding: 8px 20px;
            border: 1px solid var(--text-color, #ffffff);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color, #ffffff);
        }

        .modal-content .buttons .btn-primary {
            background: var(--text-color, #ffffff);
            color: var(--bg-color, #2b2b2b);
        }

        .modal-content .buttons .btn-danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        .modal-content .buttons .btn-danger:hover {
            background: #ff4444;
            color: white;
        }

        .modal-content .buttons button:hover {
            opacity: 0.8;
        }

        /* Настройки */
        .settings-group {
            margin: 15px 0;
        }

        .color-picker {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-picker input[type="color"] {
            width: 40px;
            height: 40px;
            border: 2px solid var(--text-color, #ffffff);
            border-radius: 5px;
            cursor: pointer;
            background: none;
            padding: 2px;
        }

        .gradient-colors {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .gradient-colors .color-input-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.1);
            padding: 5px;
            border-radius: 5px;
        }

        .gradient-colors .color-input-wrapper input[type="color"] {
            width: 30px;
            height: 30px;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .gradient-colors .color-move-btn {
            background: none;
            border: none;
            color: var(--text-color, #ffffff);
            cursor: pointer;
            font-size: 14px;
            padding: 0 3px;
            opacity: 0.5;
        }

        .gradient-colors .color-move-btn:hover {
            opacity: 1;
        }

        .gradient-colors .remove-gradient-btn {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 16px;
        }

        .add-gradient-btn {
            background: none;
            border: 1px solid var(--text-color, #ffffff);
            color: var(--text-color, #ffffff);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: var(--text-color, #ffffff);
            border-radius: 3px;
            outline: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--text-color, #ffffff);
            border-radius: 50%;
            cursor: pointer;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .checkbox-container input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .reset-btn:hover {
            opacity: 0.8;
        }

        /* Уведомления */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--text-color, #ffffff);
            border-radius: 10px;
            z-index: 2000;
            display: none;
            animation: slideDown 0.3s ease;
            max-width: 90%;
            color: var(--text-color, #ffffff);
        }

        .notification.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* Прокрутка */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-color, #ffffff);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            opacity: 0.8;
        }

        /* Контекстное меню */
        .context-menu {
            display: none;
            position: fixed;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--text-color, #ffffff);
            border-radius: 8px;
            padding: 5px 0;
            z-index: 3000;
            min-width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .context-menu.active {
            display: block;
        }

        .context-menu-item {
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.3s;
            color: var(--text-color, #ffffff);
            font-size: 14px;
        }

        .context-menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .context-menu-item.danger {
            color: #ff4444;
        }

        .context-menu-item.danger:hover {
            background: rgba(255, 68, 68, 0.2);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .store-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .tab-btn {
                font-size: 12px;
                padding: 8px 10px;
                min-width: 60px;
            }
            .modal-content {
                margin: 20px;
                min-width: auto;
            }
            .notes-panel {
                display: none !important;
            }
            .main-layout {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .store-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .top-panel {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Фоновые слои -->
        <div class="bg-layer" id="bgLayer"></div>
        <div class="gradient-layer" id="gradientLayer"></div>
        <div class="image-layer" id="imageLayer"></div>
        
        <div class="app-content">
            <!-- Верхняя панель -->
            <div class="top-panel">
                <div class="balance">💰 Баланс: <span id="balanceDisplay">0</span></div>
                <button class="settings-btn" onclick="openSettings()">⚙️</button>
            </div>

            <!-- Музыкальный плеер -->
            <div class="music-player">
                <button onclick="prevSong()">⏮</button>
                <button onclick="togglePlay()" id="playBtn">⏸</button>
                <button onclick="nextSong()">⏭</button>
            </div>

            <!-- Вкладки -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="tasks" onclick="switchTab('tasks')">📋 Задания</button>
                <button class="tab-btn" data-tab="completed" onclick="switchTab('completed')">✅ Завершённые</button>
                <button class="tab-btn" data-tab="store" onclick="switchTab('store')">🏪 Магазин</button>
                <button class="tab-btn" data-tab="temp" onclick="switchTab('temp')">⏰ Временные</button>
            </div>

            <!-- Контент -->
            <div id="tasksTab" class="tab-content active">
                <div class="main-layout">
                    <div class="table-wrapper">
                        <div class="table-container" id="tasksContainer">
                            <table id="tasksTable">
                                <thead>
                                    <tr>
                                        <th style="width: 30px;">#</th>
                                        <th>Задания</th>
                                        <th style="width: 100px;">Награда</th>
                                        <th style="width: 60px;">Статус</th>
                                    </tr>
                                </thead>
                                <tbody id="tasksBody"></tbody>
                            </table>
                            <div class="table-nav">
                                <button onclick="scrollTable('tasksContainer', -1)">▲</button>
                                <button onclick="scrollTable('tasksContainer', 1)">▼</button>
                            </div>
                        </div>
                    </div>
                    <div class="notes-panel" id="notesPanel">
                        <div class="resize-handle" id="resizeHandle"></div>
                        <div class="notes-header">
                            <h3>📝 Заметки</h3>
                            <button class="add-note-btn" onclick="addNote()">+</button>
                        </div>
                        <div class="notes-list" id="notesList"></div>
                    </div>
                </div>
            </div>

            <!-- Вкладка Завершённые -->
            <div id="completedTab" class="tab-content">
                <div class="main-layout">
                    <div class="table-wrapper">
                        <div class="table-container" id="completedContainer">
                            <table id="completedTable">
                                <thead>
                                    <tr>
                                        <th style="width: 30px;">#</th>
                                        <th>Задания</th>
                                        <th style="width: 100px;">Награда</th>
                                        <th style="width: 60px;">Статус</th>
                                    </tr>
                                </thead>
                                <tbody id="completedBody"></tbody>
                            </table>
                            <div class="table-nav">
                                <button onclick="scrollTable('completedContainer', -1)">▲</button>
                                <button onclick="scrollTable('completedContainer', 1)">▼</button>
                            </div>
                        </div>
                    </div>
                    <div class="notes-panel">
                        <div class="resize-handle" id="resizeHandle2"></div>
                        <div class="notes-header">
                            <h3>📝 Заметки</h3>
                            <button class="add-note-btn" onclick="addNote()">+</button>
                        </div>
                        <div class="notes-list" id="notesList2"></div>
                    </div>
                </div>
            </div>

            <!-- Вкладка Магазин -->
            <div id="storeTab" class="tab-content">
                <div class="store-grid" id="storeGrid"></div>
            </div>

            <!-- Вкладка Временные -->
            <div id="tempTab" class="tab-content">
                <div class="main-layout">
                    <div class="table-wrapper">
                        <div class="table-container" id="tempContainer">
                            <table id="tempTable">
                                <thead>
                                    <tr>
                                        <th style="width: 30px;">#</th>
                                        <th>Задания</th>
                                        <th style="width: 100px;">Награда</th>
                                        <th style="width: 60px;">Статус</th>
                                        <th style="width: 150px;">Дедлайн</th>
                                    </tr>
                                </thead>
                                <tbody id="tempBody"></tbody>
                            </table>
                            <div class="table-nav">
                                <button onclick="scrollTable('tempContainer', -1)">▲</button>
                                <button onclick="scrollTable('tempContainer', 1)">▼</button>
                            </div>
                        </div>
                    </div>
                    <div class="notes-panel">
                        <div class="resize-handle" id="resizeHandle3"></div>
                        <div class="notes-header">
                            <h3>📝 Заметки</h3>
                            <button class="add-note-btn" onclick="addNote()">+</button>
                        </div>
                        <div class="notes-list" id="notesList3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Контекстное меню -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" onclick="contextEdit()">✏️ Редактировать</div>
        <div class="context-menu-item danger" onclick="contextDelete()">🗑️ Удалить</div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- Уведомление -->
    <div class="notification" id="notification"></div>

    <script>
        // ===== ДАННЫЕ =====
        let data = {
            tasks: [],
            completed: [],
            store: [],
            tempTasks: [],
            notes: [],
            balance: 0,
            settings: {
                bgColor: '#2b2b2b',
                textColor: '#ffffff',
                tableColor: 'rgba(60, 60, 60, 0.6)',
                gradientColors: ['#2b2b2b', '#1a1a2e'],
                bgImage: null,
                musicVolume: 50,
                soundEffects: true
            }
        };

        let contextTarget = null;
        let contextType = null;
        let contextIndex = null;

        // ===== ЗВУК =====
        let audioContext = null;

        function playClickSound() {
            if (!data.settings.soundEffects) return;
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.value = 0.08;
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.05);
            } catch (e) {
                console.log('Sound error:', e);
            }
        }

        // Глобальный обработчик для всех кликов
        document.addEventListener('click', function() {
            playClickSound();
        });

        // ===== МУЗЫКА =====
        let musicFiles = [];
        let currentMusicIndex = 0;
        let isPlaying = false;
        let musicAudio = null;
        let musicLoaded = false;

        function loadMusicFiles() {
            musicFiles = [];
            const urls = [];
            for (let i = 1; i <= 10; i++) {
                urls.push(`songs/background${i}.mp3`);
            }
            urls.push('songs/background.mp3');
            
            let loaded = 0;
            urls.forEach(url => {
                fetch(url, { method: 'HEAD' })
                    .then(res => {
                        if (res.ok && !musicFiles.includes(url)) {
                            musicFiles.push(url);
                        }
                        loaded++;
                        if (loaded === urls.length && musicFiles.length > 0 && !musicLoaded) {
                            musicLoaded = true;
                            playSong(0);
                        }
                    })
                    .catch(() => {
                        loaded++;
                        if (loaded === urls.length && musicFiles.length > 0 && !musicLoaded) {
                            musicLoaded = true;
                            playSong(0);
                        }
                    });
            });
        }

        function playSong(index) {
            if (musicFiles.length === 0 || index >= musicFiles.length) {
                return;
            }
            try {
                if (musicAudio) {
                    musicAudio.pause();
                    musicAudio = null;
                }
                musicAudio = new Audio(musicFiles[index]);
                musicAudio.volume = data.settings.musicVolume / 100;
                musicAudio.addEventListener('ended', () => {
                    nextSong();
                });
                musicAudio.load();
                musicAudio.play().catch(() => {});
                currentMusicIndex = index;
                isPlaying = true;
                document.getElementById('playBtn').textContent = '⏸';
            } catch (e) {
                console.log('Play error:', e);
            }
        }

        function togglePlay() {
            if (musicFiles.length === 0) {
                loadMusicFiles();
                return;
            }
            if (isPlaying) {
                if (musicAudio) {
                    musicAudio.pause();
                    isPlaying = false;
                    document.getElementById('playBtn').textContent = '▶';
                }
            } else {
                if (musicAudio) {
                    musicAudio.play().catch(() => {});
                    isPlaying = true;
                    document.getElementById('playBtn').textContent = '⏸';
                } else {
                    playSong(currentMusicIndex);
                }
            }
        }

        function nextSong() {
            if (musicFiles.length === 0) return;
            const next = (currentMusicIndex + 1) % musicFiles.length;
            playSong(next);
        }

        function prevSong() {
            if (musicFiles.length === 0) return;
            const prev = (currentMusicIndex - 1 + musicFiles.length) % musicFiles.length;
            playSong(prev);
        }

        function updateMusicVolume() {
            if (musicAudio) {
                musicAudio.volume = data.settings.musicVolume / 100;
            }
        }

        // ===== СОХРАНЕНИЕ =====
        function saveData() {
            try {
                localStorage.setItem('taskManagerData', JSON.stringify(data));
            } catch (e) {
                console.log('Save error:', e);
            }
        }

        function loadData() {
            try {
                const saved = localStorage.getItem('taskManagerData');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    data = parsed;
                    if (!data.tempTasks) data.tempTasks = [];
                    if (!data.notes) data.notes = [];
                    if (!data.settings) {
                        data.settings = {
                            bgColor: '#2b2b2b',
                            textColor: '#ffffff',
                            tableColor: 'rgba(60, 60, 60, 0.6)',
                            gradientColors: ['#2b2b2b', '#1a1a2e'],
                            bgImage: null,
                            musicVolume: 50,
                            soundEffects: true
                        };
                    }
                    if (!data.settings.gradientColors) {
                        data.settings.gradientColors = ['#2b2b2b', '#1a1a2e'];
                    }
                    if (!data.settings.tableColor) {
                        data.settings.tableColor = 'rgba(60, 60, 60, 0.6)';
                    }
                    applySettings();
                    updateAll();
                    updateBalance();
                }
            } catch (e) {
                console.log('Load error:', e);
            }
        }

        // ===== ПРИМЕНЕНИЕ НАСТРОЕК =====
        function applySettings() {
            const root = document.documentElement;
            
            // Основной цвет фона
            document.getElementById('bgLayer').style.backgroundColor = data.settings.bgColor;
            
            // Градиент
            const gradientLayer = document.getElementById('gradientLayer');
            if (data.settings.gradientColors && data.settings.gradientColors.length > 1) {
                const gradient = `linear-gradient(to bottom, ${data.settings.gradientColors.join(', ')})`;
                gradientLayer.style.background = gradient;
                gradientLayer.style.display = 'block';
            } else {
                gradientLayer.style.display = 'none';
            }
            
            // Фоновое изображение
            const imageLayer = document.getElementById('imageLayer');
            if (data.settings.bgImage) {
                imageLayer.style.backgroundImage = `url(${data.settings.bgImage})`;
                imageLayer.style.display = 'block';
            } else {
                imageLayer.style.display = 'none';
            }
            
            // Цвет текста
            root.style.setProperty('--text-color', data.settings.textColor);
            
            // Цвет таблиц (полупрозрачный)
            root.style.setProperty('--table-color', data.settings.tableColor);
            
            // Применяем цвет таблиц
            document.querySelectorAll('.table-container, .store-item, .notes-panel, .modal-content').forEach(el => {
                el.style.backgroundColor = data.settings.tableColor;
            });
            
            // Музыка
            updateMusicVolume();
        }

        // ===== ОБНОВЛЕНИЕ ТАБЛИЦ =====
        function renderTasks() {
            renderTable('tasksBody', data.tasks, 'tasks', false);
        }

        function renderCompleted() {
            renderTable('completedBody', data.completed, 'completed', true);
        }

        function renderTemp() {
            renderTable('tempBody', data.tempTasks, 'temp', false);
        }

        function renderTable(bodyId, tasks, type, isCompleted) {
            const tbody = document.getElementById(bodyId);
            if (!tbody) return;
            
            let html = '';
            tasks.forEach((task, index) => {
                const statusSymbol = task.status ? '✅' : '☐';
                const rowClass = isCompleted ? 'completed-row' : 'draggable-row';
                const deadlineHtml = type === 'temp' && task.deadline ? `<td>${task.deadline}</td>` : '';
                const rewardDisplay = task.reward < 0 ? task.reward : `+${task.reward}`;
                html += `
                    <tr class="${rowClass}" data-index="${index}" data-type="${type}" draggable="true"
                        oncontextmenu="openContextMenu(event, '${type}', ${index})">
                        <td style="cursor: grab; text-align: center;">⠿</td>
                        <td ondblclick="editTask('${type}', ${index}, 'name')">${task.name || 'Новое задание'}</td>
                        <td ondblclick="editTask('${type}', ${index}, 'reward')">${rewardDisplay}</td>
                        <td class="status-checkbox" onclick="toggleTask('${type}', ${index})">${statusSymbol}</td>
                        ${deadlineHtml}
                    </tr>
                `;
            });
            
            // Пустая строка для создания
            const emptyCols = type === 'temp' ? 5 : 4;
            html += `
                <tr class="empty-row" onclick="createTask('${type}')">
                    <td></td>
                    <td colspan="${emptyCols - 1}" style="text-align: center; color: rgba(255,255,255,0.3);">
                        ✚ Нажмите для создания нового задания
                    </td>
                </tr>
            `;
            
            tbody.innerHTML = html;
            
            if (!isCompleted) {
                setupDragDrop(tbody, type);
            }
            
            // Добавляем обработчики для долгого нажатия
            if (!isCompleted) {
                setupLongPress(tbody, type);
            }
        }

        // ===== ДОЛГОЕ НАЖАТИЕ =====
        let longPressTimer = null;
        let longPressTarget = null;
        let isContextOpen = false;

        function setupLongPress(tbody, type) {
            const rows = tbody.querySelectorAll('.draggable-row');
            rows.forEach(row => {
                row.addEventListener('mousedown', function(e) {
                    longPressTarget = { type, index: parseInt(this.dataset.index) };
                    longPressTimer = setTimeout(() => {
                        if (longPressTarget && !isContextOpen) {
                            isContextOpen = true;
                            openContextMenu(e, longPressTarget.type, longPressTarget.index);
                            longPressTarget = null;
                        }
                    }, 600);
                });
                
                row.addEventListener('mouseup', function() {
                    clearTimeout(longPressTimer);
                    if (!isContextOpen) {
                        longPressTarget = null;
                    }
                });
                
                row.addEventListener('mouseleave', function() {
                    clearTimeout(longPressTimer);
                    if (!isContextOpen) {
                        longPressTarget = null;
                    }
                });
            });
        }

        // ===== КОНТЕКСТНОЕ МЕНЮ =====
        function openContextMenu(event, type, index) {
            event.preventDefault();
            const menu = document.getElementById('contextMenu');
            contextType = type;
            contextIndex = index;
            
            let x = event.clientX;
            let y = event.clientY;
            
            // Корректируем позицию, чтобы меню не выходило за экран
            if (x + 200 > window.innerWidth) x = window.innerWidth - 200;
            if (y + 100 > window.innerHeight) y = window.innerHeight - 100;
            
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            menu.classList.add('active');
            isContextOpen = true;
        }

        function closeContextMenu() {
            document.getElementById('contextMenu').classList.remove('active');
            isContextOpen = false;
            contextTarget = null;
            contextType = null;
            contextIndex = null;
        }

        function contextEdit() {
            closeContextMenu();
            if (contextType && contextIndex !== null) {
                const taskList = contextType === 'tasks' ? data.tasks : 
                               contextType === 'temp' ? data.tempTasks : null;
                if (taskList && contextIndex < taskList.length) {
                    if (contextType === 'temp') {
                        showTempTaskDialog(contextIndex);
                    } else {
                        const task = taskList[contextIndex];
                        showEditTaskDialog(contextType, contextIndex);
                    }
                }
            }
        }

        function contextDelete() {
            closeContextMenu();
            if (contextType && contextIndex !== null) {
                if (confirm('🗑️ Удалить это задание?')) {
                    const taskList = contextType === 'tasks' ? data.tasks : 
                                   contextType === 'temp' ? data.tempTasks : null;
                    if (taskList && contextIndex < taskList.length) {
                        taskList.splice(contextIndex, 1);
                        saveData();
                        updateAll();
                    }
                }
            }
        }

        // ===== ДИАЛОГ РЕДАКТИРОВАНИЯ =====
        function showEditTaskDialog(type, index) {
            const taskList = type === 'tasks' ? data.tasks : 
                           type === 'temp' ? data.tempTasks : null;
            if (!taskList || index >= taskList.length) return;
            
            const task = taskList[index];
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <h2>✏️ Редактировать задание</h2>
                <label>Название:</label>
                <input type="text" id="editTaskName" value="${task.name || ''}">
                <label>Награда:</label>
                <input type="number" id="editTaskReward" value="${task.reward || 0}">
                ${type === 'temp' ? `
                    <label>Дедлайн:</label>
                    <input type="datetime-local" id="editTaskDeadline" value="${task.deadline || ''}">
                ` : ''}
                <div class="buttons">
                    <button class="btn-primary" onclick="saveEditTask('${type}', ${index})">💾 Сохранить</button>
                    <button onclick="closeModal()">❌ Отмена</button>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function saveEditTask(type, index) {
            const taskList = type === 'tasks' ? data.tasks : 
                           type === 'temp' ? data.tempTasks : null;
            if (!taskList || index >= taskList.length) return;
            
            const task = taskList[index];
            const name = document.getElementById('editTaskName').value || 'Без названия';
            const reward = parseInt(document.getElementById('editTaskReward').value) || 0;
            
            task.name = name;
            task.reward = reward;
            
            if (type === 'temp') {
                const deadline = document.getElementById('editTaskDeadline').value || '';
                task.deadline = deadline;
            }
            
            saveData();
            updateAll();
            closeModal();
        }

        // ===== DRAG & DROP =====
        let dragData = null;

        function setupDragDrop(tbody, type) {
            const rows = tbody.querySelectorAll('.draggable-row');
            
            rows.forEach(row => {
                row.addEventListener('dragstart', function(e) {
                    dragData = { type, index: parseInt(this.dataset.index) };
                    this.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });
                
                row.addEventListener('dragend', function() {
                    this.classList.remove('dragging');
                    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                });
                
                row.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                    this.classList.add('drag-over');
                });
                
                row.addEventListener('dragleave', function() {
                    this.classList.remove('drag-over');
                });
                
                row.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('drag-over');
                    if (!dragData) return;
                    
                    const targetIndex = parseInt(this.dataset.index);
                    const sourceType = dragData.type;
                    const sourceIndex = dragData.index;
                    
                    if (sourceType === type && sourceIndex !== targetIndex) {
                        const taskList = type === 'tasks' ? data.tasks : 
                                       type === 'temp' ? data.tempTasks : null;
                        if (taskList) {
                            const [moved] = taskList.splice(sourceIndex, 1);
                            taskList.splice(targetIndex, 0, moved);
                            saveData();
                            updateAll();
                        }
                    }
                    dragData = null;
                });
            });
        }

        // ===== ФУНКЦИИ РАБОТЫ С ЗАДАНИЯМИ =====
        function toggleTask(type, index) {
            const taskList = type === 'tasks' ? data.tasks : 
                           type === 'temp' ? data.tempTasks : null;
            if (!taskList || index >= taskList.length) return;
            
            const task = taskList[index];
            if (task.status) return;
            
            // Проверяем дедлайн для временных заданий
            if (type === 'temp' && task.deadline) {
                const now = new Date();
                const deadline = new Date(task.deadline);
                if (now > deadline) {
                    showNotification('⏰ Время вышло! Ничего страшного, в следующий раз!');
                    task.status = 'failed';
                    taskList.splice(index, 1);
                    saveData();
                    updateAll();
                    return;
                }
            }
            
            task.status = true;
            
            // Тратим баллы только если награда отрицательная
            if (task.reward < 0) {
                if (data.balance < Math.abs(task.reward)) {
                    showNotification(`❌ Недостаточно баллов! Нужно: ${Math.abs(task.reward)}`);
                    task.status = false;
                    return;
                }
                data.balance += task.reward;
                showNotification(`🎉 Вы потратили ${Math.abs(task.reward)} баллов на "${task.name}"! Молодцы что накопили на него!`);
            } else {
                data.balance += task.reward;
                const rewardText = task.reward >= 0 ? `+${task.reward}` : `${task.reward}`;
                showNotification(`🎉 Молодец! Вот твоя награда: ${rewardText} баллов!`);
            }
            
            // Добавляем в завершенные
            data.completed.push({...task, status: true});
            taskList.splice(index, 1);
            
            saveData();
            updateAll();
            updateBalance();
        }

        function createTask(type) {
            if (type === 'temp') {
                showTempTaskDialog(null);
            } else {
                const newTask = { name: 'Новое задание', reward: 0, status: false };
                if (type === 'tasks') {
                    data.tasks.push(newTask);
                }
                saveData();
                updateAll();
            }
        }

        function editTask(type, index, field) {
            const taskList = type === 'tasks' ? data.tasks : 
                           type === 'temp' ? data.tempTasks : null;
            if (!taskList || index >= taskList.length) return;
            
            const task = taskList[index];
            const currentValue = field === 'name' ? task.name : String(task.reward);
            const newValue = prompt(`Введите новое ${field === 'name' ? 'название' : 'значение награды'}:`, currentValue);
            
            if (newValue !== null) {
                if (field === 'name') {
                    task.name = newValue || 'Без названия';
                } else {
                    const num = parseInt(newValue);
                    if (!isNaN(num)) {
                        task.reward = num;
                    }
                }
                saveData();
                updateAll();
            }
        }

        // ===== ВРЕМЕННЫЕ ЗАДАНИЯ =====
        function showTempTaskDialog(editIndex) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            const isEdit = editIndex !== null && editIndex !== undefined;
            const task = isEdit ? data.tempTasks[editIndex] : { name: '', reward: 0, deadline: '' };
            
            content.innerHTML = `
                <h2>${isEdit ? '✏️ Редактировать' : '➕ Новое'} временное задание</h2>
                <label>Название:</label>
                <input type="text" id="tempName" value="${task.name || ''}" placeholder="Введите название">
                <label>Награда:</label>
                <input type="number" id="tempReward" value="${task.reward || 0}">
                <label>Дедлайн:</label>
                <input type="datetime-local" id="tempDeadline" value="${task.deadline || ''}">
                <div class="buttons">
                    ${isEdit ? `<button class="btn-danger" onclick="deleteTempTask(${editIndex})">🗑️ Удалить</button>` : ''}
                    <button class="btn-primary" onclick="saveTempTask(${isEdit}, ${editIndex})">${isEdit ? '💾 Сохранить' : '➕ Создать'}</button>
                    <button onclick="closeModal()">❌ Отмена</button>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function saveTempTask(isEdit, editIndex) {
            const name = document.getElementById('tempName').value || 'Без названия';
            const reward = parseInt(document.getElementById('tempReward').value) || 0;
            const deadline = document.getElementById('tempDeadline').value || '';
            
            if (isEdit && editIndex !== null && editIndex !== undefined) {
                data.tempTasks[editIndex] = { name, reward, status: false, deadline };
            } else {
                data.tempTasks.push({ name, reward, status: false, deadline });
            }
            
            saveData();
            updateAll();
            closeModal();
        }

        function deleteTempTask(index) {
            if (index >= 0 && index < data.tempTasks.length) {
                data.tempTasks.splice(index, 1);
                saveData();
                updateAll();
                closeModal();
            }
        }

        // ===== МАГАЗИН =====
        function renderStore() {
            const grid = document.getElementById('storeGrid');
            if (!grid) return;
            
            let html = '';
            data.store.forEach((item, index) => {
                const costDisplay = `-${item.cost || 0}`;
                html += `
                    <div class="store-item" onclick="buyStoreItem(${index})" 
                         oncontextmenu="openStoreContextMenu(event, ${index}); return false;">
                        <div>${item.icon || '😊'}</div>
                        <div class="item-name">${item.name || 'Без названия'}</div>
                        <div class="item-cost">${costDisplay}</div>
                    </div>
                `;
            });
            
            html += `
                <div class="store-item add-btn" onclick="addStoreItem()">
                    <div>+</div>
                </div>
            `;
            
            grid.innerHTML = html;
            
            // Добавляем долгое нажатие для магазина
            const items = grid.querySelectorAll('.store-item:not(.add-btn)');
            items.forEach((item, index) => {
                let timer = null;
                item.addEventListener('mousedown', function(e) {
                    timer = setTimeout(() => {
                        if (!isContextOpen) {
                            isContextOpen = true;
                            openStoreContextMenu(e, index);
                        }
                    }, 600);
                });
                item.addEventListener('mouseup', function() {
                    clearTimeout(timer);
                });
                item.addEventListener('mouseleave', function() {
                    clearTimeout(timer);
                });
            });
        }

        function openStoreContextMenu(event, index) {
            event.preventDefault();
            const menu = document.getElementById('contextMenu');
            contextType = 'store';
            contextIndex = index;
            
            let x = event.clientX;
            let y = event.clientY;
            
            if (x + 200 > window.innerWidth) x = window.innerWidth - 200;
            if (y + 100 > window.innerHeight) y = window.innerHeight - 100;
            
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            menu.classList.add('active');
            isContextOpen = true;
        }

        function addStoreItem() {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <h2>🏪 Новое задание в магазине</h2>
                <label>Иконка (смайлик):</label>
                <input type="text" id="storeIcon" value="😊" maxlength="2">
                <label>Название:</label>
                <input type="text" id="storeName" value="Новое задание">
                <label>Стоимость (без минуса):</label>
                <input type="number" id="storeCost" value="10">
                <div class="buttons">
                    <button class="btn-primary" onclick="saveStoreItem()">➕ Создать</button>
                    <button onclick="closeModal()">❌ Отмена</button>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function saveStoreItem() {
            const icon = document.getElementById('storeIcon').value || '😊';
            const name = document.getElementById('storeName').value || 'Без названия';
            const cost = parseInt(document.getElementById('storeCost').value) || 0;
            
            data.store.push({ icon, name, cost });
            saveData();
            renderStore();
            closeModal();
        }

        function editStoreItem(index) {
            if (index >= data.store.length) return;
            const item = data.store[index];
            
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <h2>✏️ Редактировать задание в магазине</h2>
                <label>Иконка (смайлик):</label>
                <input type="text" id="editStoreIcon" value="${item.icon || '😊'}" maxlength="2">
                <label>Название:</label>
                <input type="text" id="editStoreName" value="${item.name || ''}">
                <label>Стоимость (без минуса):</label>
                <input type="number" id="editStoreCost" value="${item.cost || 0}">
                <div class="buttons">
                    <button class="btn-danger" onclick="deleteStoreItem(${index})">🗑️ Удалить</button>
                    <button class="btn-primary" onclick="updateStoreItem(${index})">💾 Сохранить</button>
                    <button onclick="closeModal()">❌ Отмена</button>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function updateStoreItem(index) {
            const icon = document.getElementById('editStoreIcon').value || '😊';
            const name = document.getElementById('editStoreName').value || 'Без названия';
            const cost = parseInt(document.getElementById('editStoreCost').value) || 0;
            
            if (index >= 0 && index < data.store.length) {
                data.store[index] = { icon, name, cost };
                saveData();
                renderStore();
                closeModal();
            }
        }

        function deleteStoreItem(index) {
            if (index >= 0 && index < data.store.length) {
                data.store.splice(index, 1);
                saveData();
                renderStore();
                closeModal();
            }
        }

        function buyStoreItem(index) {
            if (index >= data.store.length) return;
            const item = data.store[index];
            
            data.tasks.push({
                name: item.name,
                reward: -item.cost,
                status: false
            });
            
            saveData();
            updateAll();
            showNotification(`📋 Задание "${item.name}" добавлено в список! Выполните его чтобы потратить ${item.cost} баллов.`);
        }

        // ===== ЗАВЕРШЕННЫЕ ЗАДАНИЯ =====
        function setupCompletedLongPress() {
            const container = document.getElementById('completedContainer');
            if (!container) return;
            
            let timer = null;
            let target = null;
            
            container.addEventListener('mousedown', function(e) {
                const row = e.target.closest('.completed-row');
                if (row) {
                    target = row;
                    timer = setTimeout(() => {
                        if (target) {
                            const index = parseInt(target.dataset.index);
                            if (!isNaN(index) && index < data.completed.length) {
                                if (confirm('🗑️ Удалить это задание?')) {
                                    data.completed.splice(index, 1);
                                    saveData();
                                    updateAll();
                                }
                            }
                            target = null;
                        }
                    }, 600);
                }
            });
            
            container.addEventListener('mouseup', function() {
                clearTimeout(timer);
                target = null;
            });
            
            container.addEventListener('mouseleave', function() {
                clearTimeout(timer);
                target = null;
            });
        }

        // ===== ЗАМЕТКИ (стикеры) =====
        let noteDragData = null;

        function renderNotes() {
            const lists = document.querySelectorAll('.notes-list');
            lists.forEach(list => {
                list.innerHTML = '';
                data.notes.forEach((note, index) => {
                    const div = document.createElement('div');
                    div.className = 'note-item';
                    div.dataset.index = index;
                    div.draggable = true;
                    div.style.width = note.width || 'auto';
                    div.style.height = note.height ? note.height + 'px' : 'auto';
                    div.innerHTML = `
                        <button class="note-delete" onclick="deleteNote(${index})">✕</button>
                        <textarea oninput="updateNoteText(${index}, this.value)" 
                                  style="min-height: ${note.height || 40}px;">${note.text || ''}</textarea>
                        <div class="note-resize-handle" onmousedown="startNoteResize(event, ${index})"></div>
                    `;
                    
                    // Drag & Drop для заметок
                    div.addEventListener('dragstart', function(e) {
                        noteDragData = { index: parseInt(this.dataset.index) };
                        this.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                    });
                    
                    div.addEventListener('dragend', function() {
                        this.classList.remove('dragging');
                        document.querySelectorAll('.note-item.drag-over').forEach(el => el.classList.remove('drag-over'));
                    });
                    
                    div.addEventListener('dragover', function(e) {
                        e.preventDefault();
                        e.dataTransfer.dropEffect = 'move';
                        document.querySelectorAll('.note-item.drag-over').forEach(el => el.classList.remove('drag-over'));
                        this.classList.add('drag-over');
                    });
                    
                    div.addEventListener('dragleave', function() {
                        this.classList.remove('drag-over');
                    });
                    
                    div.addEventListener('drop', function(e) {
                        e.preventDefault();
                        this.classList.remove('drag-over');
                        if (!noteDragData) return;
                        
                        const fromIndex = noteDragData.index;
                        const toIndex = parseInt(this.dataset.index);
                        
                        if (fromIndex !== toIndex) {
                            const [moved] = data.notes.splice(fromIndex, 1);
                            data.notes.splice(toIndex, 0, moved);
                            saveData();
                            renderNotes();
                        }
                        noteDragData = null;
                    });
                    
                    list.appendChild(div);
                });
            });
        }

        function addNote() {
            data.notes.push({ text: 'Новая заметка...', height: 60, width: null });
            saveData();
            renderNotes();
        }

        function deleteNote(index) {
            data.notes.splice(index, 1);
            saveData();
            renderNotes();
        }

        function updateNoteText(index, text) {
            if (index < data.notes.length) {
                data.notes[index].text = text;
                saveData();
            }
        }

        function startNoteResize(event, index) {
            event.preventDefault();
            const note = event.target.closest('.note-item');
            const startX = event.clientX;
            const startY = event.clientY;
            const startWidth = note.offsetWidth;
            const startHeight = note.offsetHeight;
            
            function onMove(e) {
                const newWidth = Math.max(100, startWidth + (e.clientX - startX));
                const newHeight = Math.max(50, startHeight + (e.clientY - startY));
                note.style.width = newWidth + 'px';
                note.style.height = newHeight + 'px';
                if (index < data.notes.length) {
                    data.notes[index].width = newWidth;
                    data.notes[index].height = newHeight;
                }
            }
            
            function onUp() {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
                saveData();
            }
            
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        }

        // ===== РЕСАЙЗ ПАНЕЛИ ЗАМЕТОК =====
        function setupNotePanelResize() {
            const handles = document.querySelectorAll('.resize-handle');
            handles.forEach(handle => {
                handle.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    const panel = this.closest('.notes-panel');
                    const startX = e.clientX;
                    const startWidth = panel.offsetWidth;
                    
                    function onMove(ev) {
                        const newWidth = Math.max(150, Math.min(500, startWidth + (startX - ev.clientX)));
                        panel.style.width = newWidth + 'px';
                    }
                    
                    function onUp() {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                    }
                    
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            });
        }

        // ===== НАСТРОЙКИ =====
        function openSettings() {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            const gradientColors = data.settings.gradientColors || ['#2b2b2b', '#1a1a2e'];
            let gradientHtml = gradientColors.map((color, i) => `
                <div class="color-input-wrapper">
                    <input type="color" value="${color}" onchange="updateGradientColor(${i}, this.value)">
                    <button class="color-move-btn" onclick="moveGradientColor(${i}, -1)" ${i === 0 ? 'disabled' : ''}>⬆</button>
                    <button class="color-move-btn" onclick="moveGradientColor(${i}, 1)" ${i === gradientColors.length - 1 ? 'disabled' : ''}>⬇</button>
                    <button class="remove-gradient-btn" onclick="removeGradientColor(${i})">✕</button>
                </div>
            `).join('');
            
            content.innerHTML = `
                <h2>⚙️ Настройки</h2>
                
                <div class="settings-group">
                    <label>Основной цвет фона:</label>
                    <div class="color-picker">
                        <input type="color" id="bgColor" value="${data.settings.bgColor}">
                    </div>
                </div>
                
                <div class="settings-group">
                    <label>Цвет текста:</label>
                    <div class="color-picker">
                        <input type="color" id="textColor" value="${data.settings.textColor}">
                    </div>
                </div>
                
                <div class="settings-group">
                    <label>Цвет таблиц (полупрозрачный):</label>
                    <div class="color-picker">
                        <input type="color" id="tableColor" value="${data.settings.tableColor.replace(/[^0-9a-f]/gi, '') || '3c3c3c'}">
                        <span style="opacity:0.7; font-size:12px;">Прозрачность: 60%</span>
                    </div>
                </div>
                
                <div class="settings-group">
                    <label>Градиент фона (сверху вниз):</label>
                    <div class="gradient-colors" id="gradientColors">
                        ${gradientHtml}
                    </div>
                    <button class="add-gradient-btn" onclick="addGradientColor()">+ Добавить цвет</button>
                    ${gradientColors.length > 1 ? `<button class="add-gradient-btn" onclick="clearGradient()" style="margin-left:5px;">🗑️ Очистить градиент</button>` : ''}
                </div>
                
                <div class="settings-group">
                    <label>Фоновое изображение:</label>
                    <input type="file" accept="image/*" onchange="loadBackgroundImage(this)">
                    ${data.settings.bgImage ? `<button onclick="removeBgImage()" style="margin-top:5px;">🗑️ Удалить изображение</button>` : ''}
                </div>
                
                <div class="settings-group">
                    <label>Громкость музыки:</label>
                    <div class="slider-container">
                        <input type="range" id="musicVolume" min="0" max="100" value="${data.settings.musicVolume}">
                        <span id="volumeDisplay">${data.settings.musicVolume}%</span>
                    </div>
                </div>
                
                <div class="checkbox-container">
                    <input type="checkbox" id="soundEffects" ${data.settings.soundEffects ? 'checked' : ''}>
                    <label for="soundEffects">🔊 Звуковые эффекты</label>
                </div>
                
                <button class="reset-btn" onclick="resetAll()">🔄 Сбросить все настройки и данные</button>
                
                <div class="buttons">
                    <button class="btn-primary" onclick="saveSettings()">💾 Сохранить</button>
                    <button onclick="closeModal()">❌ Закрыть</button>
                </div>
            `;
            
            // Обработчик для ползунка
            document.getElementById('musicVolume').addEventListener('input', function() {
                document.getElementById('volumeDisplay').textContent = this.value + '%';
                data.settings.musicVolume = parseInt(this.value);
                updateMusicVolume();
            });
            
            modal.classList.add('active');
        }

        function saveSettings() {
            data.settings.bgColor = document.getElementById('bgColor').value;
            data.settings.textColor = document.getElementById('textColor').value;
            const tableColor = document.getElementById('tableColor').value;
            data.settings.tableColor = tableColor + '99'; // добавляем прозрачность
            
            // Сохраняем градиент
            const colorInputs = document.querySelectorAll('#gradientColors input[type="color"]');
            data.settings.gradientColors = Array.from(colorInputs).map(input => input.value);
            
            data.settings.musicVolume = parseInt(document.getElementById('musicVolume').value);
            data.settings.soundEffects = document.getElementById('soundEffects').checked;
            
            applySettings();
            saveData();
            closeModal();
        }

        function addGradientColor() {
            if (!data.settings.gradientColors) data.settings.gradientColors = ['#2b2b2b', '#1a1a2e'];
            data.settings.gradientColors.push('#3c3c3c');
            saveData();
            openSettings();
        }

        function removeGradientColor(index) {
            if (data.settings.gradientColors.length > 1) {
                data.settings.gradientColors.splice(index, 1);
                saveData();
                openSettings();
            }
        }

        function moveGradientColor(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= data.settings.gradientColors.length) return;
            const temp = data.settings.gradientColors[index];
            data.settings.gradientColors[index] = data.settings.gradientColors[newIndex];
            data.settings.gradientColors[newIndex] = temp;
            saveData();
            openSettings();
        }

        function clearGradient() {
            data.settings.gradientColors = [data.settings.bgColor];
            saveData();
            openSettings();
        }

        function updateGradientColor(index, color) {
            if (data.settings.gradientColors && index < data.settings.gradientColors.length) {
                data.settings.gradientColors[index] = color;
                saveData();
                applySettings();
            }
        }

        function loadBackgroundImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    data.settings.bgImage = e.target.result;
                    saveData();
                    applySettings();
                    openSettings();
                };
                reader.readAsDataURL(file);
            }
        }

        function removeBgImage() {
            data.settings.bgImage = null;
            saveData();
            applySettings();
            openSettings();
        }

        function resetAll() {
            if (confirm('Сбросить все настройки и данные? Это действие необратимо!')) {
                data = {
                    tasks: [],
                    completed: [],
                    store: [],
                    tempTasks: [],
                    notes: [],
                    balance: 0,
                    settings: {
                        bgColor: '#2b2b2b',
                        textColor: '#ffffff',
                        tableColor: 'rgba(60, 60, 60, 0.6)',
                        gradientColors: ['#2b2b2b', '#1a1a2e'],
                        bgImage: null,
                        musicVolume: 50,
                        soundEffects: true
                    }
                };
                saveData();
                applySettings();
                updateAll();
                updateBalance();
                closeModal();
            }
        }

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab + 'Tab').classList.add('active');
            document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
            
            if (tab === 'store') renderStore();
        }

        function updateAll() {
            renderTasks();
            renderCompleted();
            renderTemp();
            renderStore();
            renderNotes();
        }

        function updateBalance() {
            document.getElementById('balanceDisplay').textContent = data.balance;
        }

        function scrollTable(containerId, direction) {
            const container = document.getElementById(containerId);
            if (container) {
                const scrollAmount = 80 * direction;
                container.scrollTop += scrollAmount;
            }
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            clearTimeout(notification.timeout);
            notification.timeout = setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            closeContextMenu();
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        function init() {
            loadData();
            applySettings();
            updateAll();
            updateBalance();
            setupCompletedLongPress();
            setupNotePanelResize();
            
            // Загружаем музыку с задержкой
            setTimeout(() => {
                loadMusicFiles();
            }, 500);
            
            // Закрываем контекстное меню при клике вне
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.context-menu')) {
                    closeContextMenu();
                }
            });
            
            // Закрываем модальное окно по клику вне
            document.getElementById('modal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
        }

        // Запуск
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
